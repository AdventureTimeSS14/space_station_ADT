- type: entity
  parent: MarkerBase
  id: RandomPosterAny
  name: random poster spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Wallmounts/posters.rsi
      state: random_anything
  - type: EntityTableSpawner
    offset: 0
    table: !type:GroupSelector
      children:
      - id: PosterBroken
        weight: 0.05
      - !type:GroupSelector
        weight: 0.95
        prob: 0.95
        children:
        - !type:NestedSelector
          tableId: ContrabandPosterTable
        - !type:NestedSelector
          tableId: LegitPosterTable

- type: entity
  parent: MarkerBase
  id: RandomPosterContraband
