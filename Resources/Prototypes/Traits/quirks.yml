# If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!
# ADT - Трейты изменены под новую систему трейтов

- type: trait
  id: Pacifist
  name: trait-pacifist-name
  description: trait-pacifist-desc
  category: Disabilities
  cost: -4
  effects:
    - !type:AddCompsEffect
      components:
        - type: Pacified

- type: trait
  id: LightweightDrunk
  name: trait-lightweight-name
  description: trait-lightweight-desc
  category: Disabilities
  cost: -1
  speciesBlacklist:
    - IPC
    - NovakidSpecies
  effects:
    - !type:AddCompsEffect
      components:
        - type: LightweightDrunk
          boozeStrengthMultiplier: 2

- type: trait
  id: Snoring
  name: trait-snoring-name
  description: trait-snoring-desc
  category: Disabilities
  cost: 0
  speciesBlacklist:
    - IPC
    - NovakidSpecies
  effects:
    - !type:AddCompsEffect
      components:
        - type: Snoring

- type: trait
  id: Clumsy
  name: trait-clumsy-name
  description: trait-clumsy-desc
  category: Disabilities
  cost: -1
  effects:
    - !type:AddCompsEffect
      components:
        - type: Clumsy
          gunShootFailDamage:
            types:
              Blunt: 5
              Piercing: 4
            groups:
              Burn: 3
