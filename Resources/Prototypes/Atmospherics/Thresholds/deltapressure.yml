## Base prototypes for DeltaPressureComponent settings, to make it easy to just
## parent to them and just them globally here.

## For reinforced plasma windows
- type: entity
  abstract: true
  id: BaseDeltaPressureReinforcedPlasma
  components:
  - type: DeltaPressure
    minPressure: 999999 #ADT-Tweak 150000 > 999999
    minPressureDelta: 999999 #ADT-Tweak 100000 > 999999
    scalingType: Linear
    scalingPower: 0.0001

## For quarter reinforced plasma windows
- type: entity
  abstract: true
  id: BaseDeltaPressureReinforcedPlasmaQuarter
  components:
  - type: DeltaPressure
    minPressure: 999999 #ADT-Tweak 37500 > 999999
    minPressureDelta: 999999 #ADT-Tweak 25000 > 999999
    scalingType: Threshold

