# ── Бита с гвоздями ───────────────────────────────────────────
- type: entity
  name: бита с гвоздями
  parent: BaseItem
  id: DutySamodelBatNails
  description: Деревянная бита, утыканная ржавыми гвоздями. Страшновато выглядит.
  suffix: Duty, Самодел
  components:
  - type: Sprite
    sprite: _Duty/Objects/Weapons/Melee/bat_nails.rsi
    state: icon
  - type: Item
    size: Large
    shape:
    - 0,0,0,3
  - type: MeleeWeapon
    attackRate: 1.2
    damage:
      types:
        Blunt: 8
        Piercing: 6
        Structural: 5
    soundHit:
      collection: MetalThud
    wideAnimationRotation: -135
    animationRotation: -135
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 4
        Piercing: 3
  - type: StaminaDamageOnHit
    damage: 10
  - type: UseDelay
    delay: 1.2
  - type: Clothing
    quickEquip: false
    slots:
    - Back

