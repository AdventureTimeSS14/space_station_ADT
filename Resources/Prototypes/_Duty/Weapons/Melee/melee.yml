# ── Самодельный металлический щит ────────────────────────────
- type: entity
  name: самодельный металлический щит
  parent: BaseItem
  id: DutySamodelShield
  description: Сварганен из дверной панели и болтов. Замедляет владельца, но обеспечивает серьёзную защиту. Ударьте по нему другим предметом — и рядом раздастся боевой клич!
  suffix: Duty, Самодел
  components:
  - type: Sprite
    sprite: _Duty/Objects/Weapons/Melee/RiotShield.rsi
    state: riot-icon
  - type: Item
    size: Huge
  - type: Reflect
    enabled: true
    spread: 20
    reflectProb: 0.5
    reflects:
    - Energy
    - NonEnergy
  - type: MeleeWeapon
    attackRate: 0.6
    damage:
      types:
        Blunt: 6
    soundHit:
      collection: MetalThud
    wideAnimationRotation: 0
    animationRotation: 0
  - type: Clothing
    quickEquip: false
    slots:
    - suitStorage
    sprite: _Duty/Objects/Weapons/Melee/RiotShield.rsi
  - type: MovementSpeedModifier
    baseWalkSpeed: 0.65
    baseSprintSpeed: 0.65
  - type: UseDelay
    delay: 2.0
  # ShieldWarcry removed — component does not exist in this build.