- type: entity
  name: ParentBracelets
  suffix: Duty
  parent: [ BaseItem, BaseKnife ]
  abstract: true
  id: BaseBracelets
  components:
  - type: Sprite
    sprite: _Duty/Weapons/Melee/Bracelets/Salvage.rsi
    state: icon
  - type: Item
    size: Small
  - type: MeleeRequiresWield
  - type: MeleeWeapon
    attackRate: 1.5
    animation: WeaponArcFist
    wideAnimation: WeaponArcBraceletSwing
    damage:
      types:
        Blunt: 10
        Slash: 5
    WideAnimationRotation: -135
  - type: Wieldable
    HeavyStaminaCost: 5
  - type: ComboStrike
    hitsRequired: 5
    bonusDamage:
      types:
        Blunt: 10
        Slash: 50
    staminaDamage: 60
    comboSound:
      path: /Audio/Weapons/smash.ogg
      params:
        volume: 3

# ARC

- type: entity
  id: WeaponArcBraceletSwing
  categories: [ HideSpawnMenu ]
  components:
    - type: TimedDespawn
      lifetime: 0.4
    - type: Sprite
      sprite: _Duty/Weapons/Effects/BraceletArc.rsi
      state: swing
      drawdepth: Effects
    - type: EffectVisuals
    - type: WeaponArcVisuals
      fadeOut: false
    - type: Tag
      tags:
        - HideContextMenu


# ЕФЕКТЫ КОМБО УДАРОВ

- type: entity
  id: ComboHitEffectRND
  noSpawn: true
  components:
    - type: TimedDespawn
      lifetime: 0.5
    - type: Sprite
      sprite: _Duty/Weapons/Effects/BraceletCombo.rsi
      drawdepth: Effects
      layers:
        - state: RND
          shader: unshaded
    - type: Transform
      anchored: false

- type: entity
  id: ComboHitEffectSalvage
  noSpawn: true
  parent: ComboHitEffectRND
  components:
    - type: TimedDespawn
      lifetime: 2.4
    - type: Sprite
      sprite: _Duty/Weapons/Effects/BraceletCombo.rsi
      layers:
        - state: salvage
          shader: unshaded

# ВИДЫ НАРУЧЕЙ

- type: entity
  name: Salvage Bracelets
  parent: [ BaseBracelets ]
  description: Cool bracelets will kick that lava-guys for you
  id: SalvageBracelets
  components:
    - type: Sprite
      sprite: _Duty/Weapons/Melee/Bracelets/Salvage.rsi
      state: icon
    - type: MeleeWeapon
      autoAttack: true
      attackRate: 3
      damage:
        types:
          Blunt: 5.5
          Slash: 2.5
          Structural: 75
      WideAnimationRotation: -135
    - type: Sharp
    - type: ComboStrike
      hitsRequired: 6
      bonusDamage:
        types:
          Blunt: 10
          Slash: 70
      staminaDamage: 50
      comboSound:
        path: /Audio/_Duty/Weapons/Melee/Bracelets/SalvageBraceletCombo.ogg
        params:
          volume: 2
      comboEffectPrototype: ComboHitEffectSalvage

- type: entity
  name: RND Bracelets
  parent: [ BaseBracelets ]
  description: Cool bracelets to trigger artifacts with.
  id: RNDBracelets
  components:
    - type: Sprite
      sprite: _Duty/Weapons/Melee/Bracelets/RND.rsi
      state: icon
    - type: MeleeWeapon
      autoAttack: true
      attackRate: 1.7
      damage:
        types:
          Blunt: 2.5
          Heat: 0.5
          Structural: 25
      WideAnimationRotation: -135
    - type: Sharp
    - type: ComboStrike
      hitsRequired: 2
      bonusDamage:
        types:
          Blunt: 4
          Radiation: 6
          Burn: 15
      staminaDamage: 20
      comboSound:
        path: /Audio/Weapons/emitter.ogg
        params:
          volume: 2
      comboEffectPrototype: ComboHitEffectRND

- type: entity
  name: Security Bracelets
  parent: [ BaseBracelets ]
  description: Cool bracelets will kick Graytiders for you.
  id: SecurityBracelets
  components:
    - type: Sprite
      sprite: _Duty/Weapons/Melee/Bracelets/Security.rsi
      state: icon
    - type: MeleeWeapon
      autoAttack: true
      attackRate: 5
      damage:
        types:
          Blunt: 2.5
      WideAnimationRotation: -135
    - type: Sharp
    - type: ComboStrike
      hitsRequired: 10
      bonusDamage:
        types:
          Blunt: 10
          Shock: 20
      staminaDamage: 200
      comboSound:
        path: /Audio/Effects/sparks4.ogg
        params:
          volume: 5
      comboEffectPrototype: EffectSparks

# крафты
- type: technology
  id: Bracelets
  name: Кинетические наручи
  icon:
    sprite: _Duty/Weapons/Melee/Bracelets/Salvage.rsi
    state: icon
  discipline: Experimental
  tier: 1
  cost: 7500
  recipeUnlocks:
  - BraceletSalvageRecipe
  - BraceletRNDRecipe
  - BraceletSecurityRecipe
  position: -2,3

- type: latheRecipe
  id: BraceletSalvageRecipe
  result: SalvageBracelets
  completetime: 3
  materials:
    Steel: 3000
    Plastic: 500
    Gold: 1000

- type: latheRecipe
  id: BraceletRNDRecipe
  result: RNDBracelets
  completetime: 3
  materials:
    Steel: 1000
    Plastic: 250
    Gold: 300
    Plasma: 1000

- type: latheRecipe
  id: BraceletSecurityRecipe
  result: SecurityBracelets
  completetime: 3
  materials:
    Steel: 2000
    Plastic: 500
    Gold: 250

- type: latheRecipePack
  id: BraceletSecurity
  recipes:
  - BraceletSecurityRecipe

- type: latheRecipePack
  id: CivilBracelets
  recipes:
  - BraceletRNDRecipe
  - BraceletSalvageRecipe
