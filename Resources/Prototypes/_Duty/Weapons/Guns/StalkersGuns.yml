# ── СВД ──────────────────────────────────────────────────────
- type: entity
  name: СВД
  parent: [BaseItem, BaseGunWieldable, BaseSecurityContraband, ADTBaseMagneticGun]
  id: DutyGunSVD
  description: Снайперская винтовка Драгунова. Самозарядная, точная, для работы на дистанции.
  suffix: Duty, Огнестрел
  components:
  - type: Sprite
    # ТЕКСТУРА: RSI папка Textures/_Duty/Objects/Weapons/Guns/Snipers/svd.rsi
    # Нужны состояния: base (96x32), mag-0 (96x32)
    sprite: _Duty/Objects/Weapons/Guns/Snipers/svd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Huge
    shape:
    - 0,0,5,1
  - type: Clothing
    sprite: _Duty/Objects/Weapons/Guns/Snipers/svd.rsi
    quickEquip: false
    slots:
    - Back
  - type: Gun
    fireRate: 1
    minAngle: 0
    maxAngle: 3
    angleIncrease: 1
    angleDecay: 8
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    projectileSpeed: 60
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Duty/Weapons/Guns/RifleGen/Bolt/rifle_bolt_closed.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ADTMagazineHristovAdvanced
        insertSound: /Audio/_Duty/Weapons/Guns/RifleGen/MagIn/osv96_magin.ogg
        ejectSound: /Audio/_Duty/Weapons/Guns/RifleGen/MagOut/osv96_magout.ogg
        priority: 2
        whitelist:
          tags:
          - ADTMagazineHristovAdvanced
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeAntiMateriel
        priority: 1
        whitelist:
          tags:
          - CartridgeAntiMateriel
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: AmmoCounter
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: 0
    maxAngle: -2
  - type: SpeedModifiedOnWield
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: EyeCursorOffset
    maxOffset: 5.0
    pvsIncrease: 0.3
  - type: MeleeWeapon
    resetOnHandSelected: false
    attackRate: 0.65
    damage:
      types:
        Blunt: 20
    soundHit:
      collection: GenericHit
  - type: AltFireMelee
  - type: AttachableHolder # ADT-Tweak
    slots:
      rmc-aslot-rail:
        locked: false # ADT-Tweak true -> false
        startingAttachable: ADTAttachmentHristovScope
        whitelist:
            tags:
            - ADTAttachmentMagneticHarness
            - ADTAttachmentHristovScope
  - type: StaticPrice
    price: 800

