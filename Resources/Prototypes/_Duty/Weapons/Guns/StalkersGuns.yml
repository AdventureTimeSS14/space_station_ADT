# ── АК-105 ────────────────────────────────────────────────────
- type: entity
  name: АК-105
  parent: [BaseWeaponRifle, BaseSecurityContraband]
  id: DutyGunAK105
  description: Укороченная штурмовая винтовка Калашникова. Надёжная и неприхотливая.
  suffix: Duty, Огнестрел
  components:
  - type: Sprite
    # ТЕКСТУРА: RSI папка Textures/_Duty/Objects/Weapons/Guns/Rifles/ak105.rsi
    # Нужны состояния: base (64x32), mag-0 (64x32)
    sprite: _Duty/Objects/Weapons/Guns/Rifles/ak105.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Duty/Objects/Weapons/Guns/Rifles/ak105.rsi
  - type: Gun
    fireRate: 7
    minAngle: 5
    maxAngle: 20
    angleIncrease: 3
    angleDecay: 6
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rifle2.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Duty/Weapons/Guns/RifleGen/Cock/rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifle
        insertSound: /Audio/_Duty/Weapons/Guns/RifleGen/MagIn/rifle_magin.ogg
        ejectSound: /Audio/_Duty/Weapons/Guns/RifleGen/MagOut/rifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineLightRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: GunWieldBonus
    minAngle: -4
    maxAngle: -15
  - type: MeleeWeapon
    resetOnHandSelected: false
    attackRate: 0.65
    damage:
      types:
        Blunt: 20
    soundHit:
      collection: GenericHit
  - type: AltFireMelee

