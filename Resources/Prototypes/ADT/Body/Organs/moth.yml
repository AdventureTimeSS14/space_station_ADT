- type: entity
  id: OrganMothStomach
  parent: [OrganAnimalStomach, OrganHumanStomach]
  categories: [ HideSpawnMenu ]
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - ClothMade
      - Paper
      - Fruit
      - Pill
      - ADTMothFriendlyFood
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Metabolizer
    maxReagents: 3
    metabolizerTypes: [ Moth ]
    removeEmpty: true
    groups:
      - id: Food
      - id: Drink
      - id: Alcohol

- type: entity
  id: OrganMothHeart
  parent: OrganAnimalHeart
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Moth ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic

- type: entity
  id: OrganMothLiver
  parent: OrganAnimalLiver
  name: moth liver
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: liver
  - type: Organ
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [ Moth ]
    groups:
    - id: Alcohol
      rateModifier: 0.1
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Tag
    tags:
    - Meat
    - Organ
    - Liver
