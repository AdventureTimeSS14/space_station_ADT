- type: entity
  id: ADTOrganUrsusStomach
  parent: BaseAnimalOrgan
  name: ursus stomach
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 80
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    maxReagents: 3
    metabolizerTypes: [ Ursus ]
    groups:
    - id: Food
    - id: Drink
    - id: Alcohol
  - type: Item
    size: Small
    heldPrefix: stomach
  - type: Tag
    tags:
    - Meat
    - Organ
    - Stomach

- type: entity
  id: ADTOrganUrsusLiver
  parent: BaseAnimalOrgan
  name: ursus liver
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: liver
  - type: Organ
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [ Ursus ]
    groups:
    - id: Alcohol
      rateModifier: 0.1
  - type: Item
    size: Small
    heldPrefix: liver
  - type: Tag
    tags:
    - Meat
    - Organ
    - Liver

- type: entity
  id: ADTOrganUrsusHeart
  parent: BaseAnimalOrgan
  name: ursus heart
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: heart-on
  - type: Organ
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Ursus ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: Item
    size: Small
    heldPrefix: heart
  - type: Tag
    tags:
    - Meat
    - Organ
    - Heart
