- type: entity
  id: ADTOrganVulpkaninStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
    - type: Stomach
    - type: SolutionContainerManager
      solutions:
        stomach:
          maxVol: 50.0
        food:
          maxVol: 5
          reagents:
          - ReagentId: UncookedAnimalProteins
            Quantity: 5
    - type: Metabolizer
      maxReagents: 3
      metabolizerTypes: [ Vulpkanin ]
      groups:
      - id: Food
      - id: Drink
      - id: Alcohol


- type: entity
  id: ADTOrganVulpkaninLiver
  parent: BaseAnimalOrgan
  name: liver
  #categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: liver
  - type: Organ
  - type: Metabolizer
    maxReagents: 1
    metabolizerTypes: [ Vulpkanin ]
    groups:
    - id: Alcohol
      rateModifier: 0.1

- type: entity
  id: ADTOrganVulpkaninHeart
  parent: OrganAnimalHeart
  components:
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Vulpkanin, Animal ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
