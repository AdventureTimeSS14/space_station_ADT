- type: entity
  parent: BaseHumanOrgan
  id: ADTOrganNovakidStomach
  suffix: "novakid"
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      sprite: Mobs/Species/Human/organs.rsi
      state: stomach
    - type: Stomach
    - type: SolutionContainerManager
      solutions:
        stomach:
          temperature: 293.15
          canReact: true
          maxVol: 50.0
        food:
          temperature: 293.15
          canReact: true
          maxVol: 0
          name: food
    - type: Metabolizer
      maxReagents: 7
      metabolizerTypes: [ Novakid ]
      groups:
      - id: Food
      - id: Drink
      - id: Alcohol
    - type: Tag # goob edit
      tags:
      - Organ
      - Stomach

- type: entity
  parent: BaseHumanOrgan
  id: ADTOrganNovakidLungs
  suffix: "novakid"
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: lung-l
  - type: Lung
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - data: []
          ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - data: []
          ReagentId: UncookedAnimalProteins
          Quantity: 5
      Lung:
        maxVol: 100
        name: Lung
        canReact: false
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Novakid ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: Tag # goob edit
    tags:
    - Organ
    - Lungs

