- type: trait
  id: ADTDisproportionate
  name: trait-disproportionate-name
  description: trait-disproportionate-desc
  category: Quirks
  cost: 0
  speciesWhitelist:
    - IPC
  rewriteComponents: true
  components:
  - type: SuitSensor
    onMob: true
    sensorsTime: 6
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensor
    savableAddress: false
  - type: WirelessNetworkConnection
    range: 1200
  - type: StationLimitedNetwork
  - type: Inventory
    templateId: ipcDisproportionate
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

