- type: trait
  id: PseudobulbarAffect
  name: trait-pseudobulbar-affect-name
  description: trait-pseudobulbar-affect-desc
  category: Disabilities
  cost: -1
  speciesBlacklist:
    - IPC
  effects:
    - !type:AddCompsEffect
      components:
        - type: EmotionallyUnstableAccent
          triggerEmotionChance: 0.2
          exclamatorySentenceChance: 0.5
          changeMessageChance: 0.3
          emotes:
            - Laugh
            - Scream
            - Crying
        - type: EmotionLoop
          minTimeBetweenEmotions: 60
          maxTimeBetweenEmotions: 90
          emotes:
            - Laugh
            - Scream
            - Crying

