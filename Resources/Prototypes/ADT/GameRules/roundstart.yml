- type: entityTable
  id: RampingGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: BasicAntagEventsTable
      - !type:NestedSelector
        tableId: CargoGiftsTable

- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseHereticRule
  components:
  - type: HereticRule
  - type: AntagSelection
  - type: AntagRandomObjectives
    sets:
    - groups: HereticObjectiveGroup
    maxDifficulty: 7

- type: entity
  parent: BaseHereticRule
  id: Heretic
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 25
  - type: AntagSelection
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 4
      playerRatio: 15
      lateJoinAdditional: true
      mindComponents:
      - type: HereticRole

- type: entity
  parent: BaseHereticRule
  id: HereticSoloGameRule
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 25
  - type: AntagSelection
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 1
      playerRatio: 15
      lateJoinAdditional: true
      mindComponents:
      - type: HereticRole

- type: entityTable
  id: ExtendedGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entity
  id: ExtendedStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ExtendedGameRulesTable

#Облегченное число агентов
- type: entity
  parent: BaseTraitorRule
  id: TraitorLightGameRule
  components:
  - type: GameRule
    minPlayers: 5
    delay:
      min: 240
      max: 420
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Traitor ]
      max: 4
      playerRatio: 15
      blacklist:
        components:
        - AntagImmune
      lateJoinAdditional: true
      mindRoles:
      - MindRoleTraitor
  - type: AntagRandomObjectives
    sets:
    - groups: TraitorLightObjectiveGroups
    maxDifficulty: 8

- type: entityTable
  id: TraitorLightGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: BasicAntagEventsTable
      - id: ParadoxCloneSpawn
      - id: SleeperAgentsLight
      - id: LoneOpsSpawn
      - id: VoxRaidersEvent
      - !type:NestedSelector
        tableId: DerelictBorgEventTable
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entity
  id: TraitorLightStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: TraitorLightGameRulesTable
    minMaxEventTiming:
      min: 300
      max: 900

