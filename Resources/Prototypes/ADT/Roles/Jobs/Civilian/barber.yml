- type: job
  id: ADTBarber
  name: job-name-ADTbarber
  description: job-description-ADTbarber
  playTimeTracker: JobADTBarber
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 9000 #2.5 hrs
  startingGear: ADTBarberGear
  icon: "JobIconADTBarber"
  supervisors: job-supervisors-hop
  access:
  - Service
  - Maintenance
  - !type:AddSpeciesComponentSpecial
    species: IPC
    components:
      - type: BorgChassis
        maxModules: 1
        moduleWhitelist:
          tags:
          - BorgModuleGeneric
          - BorgModuleService
        ipc: true

- type: startingGear
  id: ADTBarberGear
  equipment:
    id: ADTBarberPDA
    ears: ClothingHeadsetService
    pocket1: ADTRazor
    pocket2: BarberScissors

- type: chameleonOutfit
  id: ADTBarberChameleonOutfit
  job: ADTBarber
  hasMindShield: true
  equipment:
    shoes: ClothingShoesColorBlack
    id: ADTBarberPDA
    ears: ClothingHeadsetService
