- type: reagent
  id: PurpleXenoJelly
  parent: Slime
  name: reagent-name-purple-xeno-jelly
  color: "#BF77F6"
  metabolisms:
    Food:
      effects:
      - !type:ModifySlimeComponent
        conditions:
        - !type:ReagentThreshold
          min: 1
          max: 1
        extractBonus: 1

