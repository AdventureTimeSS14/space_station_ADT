- type: martialArt
  id: Capoeira
  martialArtsForm: Capoeira
  roundstartCombos: CapoeiraMoves

- type: comboList
  id: CapoeiraMoves
  combos:
  - PushKick
  - SweepKick
  - CircleKick
  - SpinKick
  - KickUp

- type: combo
  id: PushKick
  name: capoeira-combo-push-kick
  martialArtsForm: Capoeira
  attacks:
  - Grab
  - Harm
  - Harm
  event: !type:PushKickPerformedEvent
    staminaToHeal: -30
    sound:
      path: /Audio/Weapons/genhit3.ogg
  modifierSet:
      coefficients:
        Blunt: 1.25
        Slash: 1.25
        Piercing: 1.25
      ignoreArmorPierceFlags: All
  paralyzeTime: 2 # this is further multiplied by your movespeed, about 6 seconds if you're running
  dropItems: true

- type: combo
  id: CircleKick
  name: capoeira-combo-circle-kick
  martialArtsForm: Capoeira
  attacks:
  - Disarm
  - Disarm
  - Harm
  event: !type:CircleKickPerformedEvent
    staminaToHeal: -40
    sound:
      path: /Audio/Weapons/genhit2.ogg
  extraDamage: 15
  canDoWhileProne: false

- type: combo
  id: SweepKick
  name: capoeira-combo-sweep-kick
  martialArtsForm: Capoeira
  attacks:
  - Harm
  - Harm
  - Disarm
  event: !type:SweepKickPerformedEvent
    staminaToHeal: -60
    attackSpeedMultiplier: 1.5
    attackSpeedMultiplierTime: 5
    minVelocity: 2
    sound:
      path: /Audio/Weapons/genhit1.ogg
  extraDamage: 10
  paralyzeTime: 1
  staminaDamage: 10
  canDoWhileProne: false

- type: combo
  id: SpinKick
  name: capoeira-combo-spin-kick
  martialArtsForm: Capoeira
  attacks:
  - Grab
  - Harm
  - Disarm
  - Harm
  event: !type:SpinKickPerformedEvent
    staminaToHeal: -100
    attackSpeedMultiplier: 1.5
    attackSpeedMultiplierTime: 5
    minVelocity: 2
    sound:
      path: /Audio/Weapons/genhit1.ogg
  paralyzeTime: 2
  staminaDamage: 15
  extraDamage: 25
  canDoWhileProne: false

- type: combo
  id: KickUp
  name: capoeira-combo-kick-up
  martialArtsForm: Capoeira
  attacks:
  - Disarm
  - Disarm
  event: !type:KickUpPerformedEvent
    staminaToHeal: 0
  performOnSelf: true
