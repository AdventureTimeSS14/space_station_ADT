# IVDrips
- type: constructionGraph
  id: IVDripGraph
  start: start
  graph:
  - node: start
    actions:
    - !type:SpawnPrototype
      prototype: SheetSteel1
      amount: 5
    - !type:SpawnPrototype
      prototype: PartRodMetal1
      amount: 2
    - !type:SpawnPrototype
      prototype: SheetPlastic1
      amount: 5
    - !type:DeleteEntity {}
    edges:
    - to: IVDripNode
      completed:
      - !type:SnapToGrid {}
      steps:
      - material: MetalRod
        amount: 2
        doAfter: 1
      - material: Steel
        amount: 5
      - material: Plastic
        amount: 5
  - node: IVDripNode
    entity: ADTIVDrip
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 1
