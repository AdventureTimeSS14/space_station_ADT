# ADT: Open barrels construction graphs — 8 steel each (construction menu)
- type: constructionGraph
  id: ADTBarrelChemWaterOpen
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: barrel
          steps:
            - material: Steel
              amount: 8
              doAfter: 10
    - node: barrel
      entity: ADTBarrelChemWaterOpenEmpty
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 6
          steps:
            - tool: Prying
              doAfter: 8

