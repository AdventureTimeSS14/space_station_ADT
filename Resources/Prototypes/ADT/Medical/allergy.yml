- type: allergicReaction
  id: mildAllergicReaction
  threshold: 5
  effects:
    - !type:Jitter
      time: 5
      probability: 0.3
    - !type:Emote
      emote: Cough
      showInChat: true
      probability: 0.3

- type: allergicReaction
  id: midAllergicReaction
  threshold: 15
  effects:
    - !type:Jitter
      time: 5
    - !type:HealthChange
        damage:
          types:
            Asphyxiation: -1.5
            Bloodloss: -1.5
        probability: 0.5
    - !type:Emote
      emote: Cough
      showInChat: true
      probability: 0.7

- type: allergicReaction
  id: highAllergicReaction
  threshold: 25
  effects:
    - !type:Jitter
      time: 5
    - !type:HealthChange
        damage:
          types:
            Asphyxiation: -2.5
            Bloodloss: -2.5
    - !type:Emote
      emote: Cough
      showInChat: true

- type: allergicReaction
  id: itsOverAllergicReaction
  threshold: 35
  effects:
    - !type:Jitter
      time: 5
    - !type:HealthChange
        damage:
          types:
            Asphyxiation: -5
            Bloodloss: -5
    - !type:Emote
      emote: Cough
      showInChat: true
