- type: allergicReaction
  id: mildAllergicReaction
  threshold: 5
  effects:
    - !type:Jitter
      time: 5
      probability: 0.3
    - !type:Emote
      emote: Cough
      showInChat: true
      probability: 0.3

- type: allergicReaction
  id: midAllergicReaction
  threshold: 15
  effects:
    - !type:Jitter
      time: 5
    - !type:HealthChange
        damage:
          groups:
            Airloss: -3
        probability: 0.5
    - !type:Emote
      emote: Cough
      showInChat: true
      probability: 0.7

