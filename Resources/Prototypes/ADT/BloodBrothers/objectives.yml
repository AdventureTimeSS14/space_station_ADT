# Protect a random person
- type: entity
  parent: [BaseBloodBrotherObjective, BaseTargetObjective, BaseKeepAliveObjective]
  id: BloodBrotherProtectObjective
  description: Этот человек полезен нашему делу. Проследите, чтобы он остался жив.
  components:
  - type: Objective
    difficulty: 1.75
    unique: false
    icon:
      sprite: Objects/Misc/folders.rsi
      state: folder-colormap
  - type: TargetObjective
    title: objective-condition-other-traitor-alive-title
  - type: PickRandomPerson
    filters:
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KeepAliveCondition
    - !type:ADT.BloodBrothers.Filters.FilterOutOwnBloodBrotherTeam

