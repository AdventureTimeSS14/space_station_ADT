# Blood Brothers objectives

# Base for blood brother objectives
- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseBloodBrotherObjective
  components:
  - type: Objective
    issuer: objective-issuer-syndicate

# Both brothers escape together (always assigned)
- type: entity
  parent: [BaseBloodBrotherObjective, BaseLivingObjective]
  id: BothBrothersEscapeObjective
  name: Сбежать на Центком живыми и без наручников вместе с братом.
  description: Один из наших агентов встретит вас по прибытии. Не показывайтесь в наручниках. Ваш брат тоже должен сбежать живым и свободным.
  components:
  - type: Objective
    difficulty: 1.3
    unique: true
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: shuttle
  - type: BothBrothersEscapeCondition

# Kill a random person
- type: entity
  parent: [BaseBloodBrotherObjective, BaseKillObjective]
  id: BloodBrotherKillObjective
  description: Сделайте это как вам удобнее, главное — не дайте им покинуть станцию.
  components:
  - type: Objective
    difficulty: 1.75
    unique: false
  - type: TargetObjective
    title: objective-condition-maroon-person-title
  - type: PickRandomPerson
    filters:
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
    - !type:ADT.BloodBrothers.Filters.FilterOutOwnBloodBrotherTeam
  - type: KillPersonCondition
    requireMaroon: true

# Kill a random head of staff
- type: entity
  parent: [BaseBloodBrotherObjective, BaseKillObjective]
  id: BloodBrotherKillHeadObjective
  description: Убейте главу отдела и убедитесь, что он не сбежит на Центком.
  components:
  - type: Objective
    difficulty: 3.0
    unique: true
  - type: TargetObjective
    title: objective-condition-kill-maroon-title
  - type: PickRandomPerson
    filters:
    - !type:BodyMindFilter
      whitelist:
        components:
        - CommandStaff
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
    - !type:ADT.BloodBrothers.Filters.FilterOutOwnBloodBrotherTeam
  - type: KillPersonCondition
    requireDead: true
    requireMaroon: true

