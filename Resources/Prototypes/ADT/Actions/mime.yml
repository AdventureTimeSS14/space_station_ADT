- type: entity
  id: ADTActionMimeFingerGun
  name: Finger Gun
  description: Shoot an invisible energy bolt from your finger!
  components:
  - type: Action
    icon:
      sprite: ADT/Interface/Actions/mime.rsi
      state: fingergun
    useDelay: 60
  - type: InstantAction
    event: !type:MimeFingerGunActionEvent

- type: entity
  id: ADTActionMimeSilence
  name: Silence
  description: Silence everyone around you with a theatrical gesture!
  components:
  - type: Action
    icon:
      sprite: ADT/Interface/Actions/mime.rsi
      state: mime_silence
    useDelay: 60
  - type: InstantAction
    event:
      !type:MimeSilenceActionEvent
      range: 10
      muteDuration: 20
