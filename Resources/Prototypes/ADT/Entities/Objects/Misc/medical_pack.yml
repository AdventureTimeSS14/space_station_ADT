- type: entity
  parent: BaseItem
  id: ADTBloodPackTransfusion
  name: blood pack
  description: An empty blood pack ready to be filled.
  suffix: Empty
  components:
  - type: BloodPack
  - type: Sprite
    sprite: ADT/Objects/Medical/blood_pack.rsi
    layers:
    - state: bloodpack1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: bloodpack
  - type: Item
    sprite: ADT/Objects/Medical/blood_pack.rsi
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 100
  - type: FitsInDispenser
    solution: pack
  - type: RefillableSolution
    solution: pack
  - type: DrainableSolution
    solution: pack
  - type: ExaminableSolution
    solution: pack
  - type: DrawableSolution
    solution: pack
  - type: InjectableSolution
    solution: pack
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 7
    fillBaseName: bloodpack
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:SpillBehavior
        solution: pack
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 2
    damage:
      types:
        Blunt: 5
  - type: StaticPrice
    price: 30
  - type: Tag
    tags:
    - Bloodpack
  - type: Edible
    edible: Drink # Namesake. This entity is a sort of cup you can drink directly from.
    destroyOnEmpty: false
    utensil: None # Spoons don't fit in cups, also conflicts with bar spoon stirring
    solution: pack

- type: entity
  parent: ADTBloodPackTransfusion
  id: ADTBloodPackTransfusionFull
  name: blood pack
  description: An empty blood pack ready to be filled.
  suffix: Full
  components:
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 100
        reagents:
        - ReagentId: Blood
          Quantity: 100

