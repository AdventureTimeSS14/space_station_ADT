- type: entity
  name: plant analyzer
  parent: BaseItem
  id: ADTBasePlantAnalyzer
  description: A handheld device that allows you to scan seeds and plants to get detailed information about their genes.
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Objects/Devices/plant_analyzer.rsi
    layers:
    - state: plantanalyzer
    - state: unlit
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      shader: unshaded
  - type: Item
    storedRotation: -90
  - type: ActivatableUI
    key: enum.PlantAnalyzerUiKey.Key
    inHandsOnly: true
  - type: UserInterface
    interfaces:
      enum.PlantAnalyzerUiKey.Key:
        type: PlantAnalyzerBoundUserInterface
  - type: PlantAnalyzer
    settings:
      scanDelay: 5
      advScanDelay: 10
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: Appearance
  - type: BatteryVisuals
  - type: GenericVisualizer
    visuals:
      enum.BatteryVisuals.State:
        enum.PowerDeviceVisualLayers.Powered:
          Full: { visible: true }
          Neither: { visible: true }
          Empty: { visible: false }

- type: entity
  id: ADTPlantAnalyzer
  parent: [ADTBasePlantAnalyzer, PowerCellSlotSmallItem]
  components:
  - type: PowerCellDraw
    drawRate: 0
    useCharge: 40
  - type: ActivatableUIRequiresPowerCell

- type: entity
  id: ADTPlantAnalyzerEmpty
  parent: ADTPlantAnalyzer
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default

- type: entity
  id: ADTPlantAnalyzerDebug
  parent: ADTBasePlantAnalyzer
  suffix: Debug
  components:
  - type: PlantAnalyzer
    settings:
      scanDelay: 0.1
      advScanDelay: 0.5

- type: entity
  id: ADTAdvancedPlantAnalyzer
  name: advanced plant analyzer
  parent: ADTPlantAnalyzer
  components:
  - type: PowerCellDraw
    drawRate: 0
    useCharge: 10
  - type: ActivatableUIRequiresPowerCell
  - type: PlantAnalyzer
    settings:
      scanDelay: 1.5
      advScanDelay: 3
  - type: Sprite
    sprite: ADT/Objects/Devices/plant_analyzerT2.rsi
    layers:
    - state: plantanalyzer
    - state: unlit
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      shader: unshaded

  
- type: entity
  id: ADTAdvancedPlantAnalyzerEmpty
  parent: ADTAdvancedPlantAnalyzer
  suffix: Empty
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
