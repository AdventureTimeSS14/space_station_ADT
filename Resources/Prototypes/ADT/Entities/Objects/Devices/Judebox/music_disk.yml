- type: entity
  parent: BaseItem
  id: ADTMusicDiskStandard
  name: music disk (standart)
  description: A magnetic tape that can hold up to two minutes of content on either side.
  components:
  - type: Sprite
    sprite: ADT/Objects/Misc/module.rsi
    layers:
    - state: datadisk_base
      color: "#1cf01c"
    - state: datadisk_label_music
  - type: Item
    size: Tiny
  - type: Damageable
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/ADT/Items/Handling/disk_pickup.ogg
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/ADT/Items/Handling/disk_drop.ogg
      params:
        volume: -6
  - type: EmitSoundOnLand
    sound:
      path: /Audio/ADT/Items/Handling/disk_drop.ogg
      params:
        volume: -6
  - type: JukeboxDisk
    tracksCollection: Standard
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: StaticPrice
    price: 50

- type: entity
  parent: BaseItem
  id: ADTMusicDiskRandom
  name: music disk (Chill)
  description: A magnetic tape that can hold up to two minutes of content on either side.
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    layers:
    - state: harddisk
      map: [ "base" ]
  - type: Item
    size: Tiny
  - type: Damageable
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/ADT/Items/Handling/disk_pickup.ogg
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/ADT/Items/Handling/disk_drop.ogg
      params:
        volume: -6
  - type: EmitSoundOnLand
    sound:
      path: /Audio/ADT/Items/Handling/disk_drop.ogg
      params:
        volume: -6
  - type: JukeboxDisk
    useRandom: true
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: StaticPrice
    price: 210

- type: entity
  name: box of music discs
  parent: BoxCardboard
  id: ADTBoxMusicDisks
  description: A box containing a set of standard music discs.
  components:
  - type: Sprite
    layers:
      - state: box
      - state: disk
  - type: Storage
    grid:
    - 0,0,2,1
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
  - type: StorageFill
    contents:
      - id: ADTMusicDiskStandard
      - id: ADTMusicDiskRock
      - id: ADTMusicDiskSonic
      - id: ADTMusicDiskChill
      - id: ADTMusicDiskVa11Hall

- type: entity
  name: music set Syndicate
  parent: BoxCardboard
  id: ADTBoxMusicDisksSyndicate
  description: A box containing a set of a music player and discs to it.
  components:
  - type: Sprite
    layers:
      - state: box_of_doom
      - state: disk
  - type: Storage
    grid:
    - 0,0,2,1
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
  - type: StorageFill
    contents:
      - id: ADTJukeBoxPlayer
      - id: ADTMusicDiskHotline
      - id: ADTMusicDiskMix
      - id: ADTMusicDiskRock

