- type: entity
  name: radio
  description: A radio, connected to some radio channel.
  parent: BaseItem
  id: ADTOldRadio
  components:
  - type: RadioSpeaker
    speechMode: Speak
    soundOnReceive:
      path: /Audio/ADT/Effects/static.ogg
      params:
        volume: -6
        maxDistance: 10
        variation: 0.05
    channels:
    - ADTOldBroadcast
  - type: Speech
    speechVerb: ADTRadioBroadcasting
  - type: Sprite
    sprite: ADT/Objects/Devices/communication.rsi
    layers:
#   - state: old-radio-off
    - state: old-radio
    state: old-radio
  - type: Item
    sprite: ADT/Objects/Devices/communication.rsi
    heldPrefix: old-radio
  - type: Construction
    graph: BroadcastRadio
    node: oldRadio
  - type: Tag
    tags:
    - ADTOldRadio

- type: entity
  name: radio microphone
  description: A microphone for all aspiring radio hosts.
  parent: BaseItem
  id: ADTOldRadioMicrophone
  components:
  - type: RadioMicrophone
    listenRange: 1
    broadcastChannel: ADTOldBroadcast
  - type: Sprite
    sprite: Objects/Fun/Instruments/microphone.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Objects/Fun/Instruments/microphone.rsi
  - type: Tag
    tags:
    - ADTBroadcastMicrophone

- type: entity
  parent: BaseItem
  id: ADTClosedRadio
  name: handheld radio
  description: A handy handheld radio.
  components:
  - type: TelecomExempt
  - type: RadioMicrophone
    broadcastChannel: ADTClosedChannel
  - type: RadioSpeaker
    channels:
    - ADTClosedChannel
  - type: Speech
    speechVerb: Robotic
  - type: Sprite
    sprite: ADT/Objects/Devices/communication.rsi
    layers:
    - state: icon
    - state: icon-on
    state: icon
  - type: Item
    sprite: ADT/Objects/Devices/communication.rsi
    heldPrefix: icon
  - type: Tag
    tags:
    - ADTClosedRadio

- type: entity
  name: music player
  description: A modern turntable with a bright and sonorous sound. Supports most media formats.
  parent: BaseItem
  id: ADTJukeBoxPlayer
  components:
  - type: Sprite
    sprite: ADT/Objects/Devices/music_player.rsi
    layers:
    - state: icon
    - state: icon_inserted
      map: ["disk"]
      visible: false
    - state: volume_3
      map: ["volume"]
      visible: true
  - type: Item
    size: Normal
    shape:
    - 0,0,2,1
  - type: Construction
    graph: BroadcastRadio
    node: oldRadio
  - type: ActivatableUI
    key: enum.JukeboxUiKey.Key
  - type: ContainerContainer
    containers:
      music_disk: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      music_disk:
        whitelist:
          components:
          - JukeboxDisk
  - type: Jukebox
  - type: Transform
    anchored: false
    noRot: false
  - type: Anchorable
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.JukeboxVisuals.HasDisk:
        disk:
          True: { visible: true }
          False: { visible: false }
      enum.JukeboxVisuals.VolumeLevel:
        volume:
          Level0: { state: "volume_0" }
          Level1: { state: "volume_1" }
          Level2: { state: "volume_2" }
          Level3: { state: "volume_3" }
          Level4: { state: "volume_4" }
  - type: UserInterface
    interfaces:
        enum.JukeboxUiKey.Key:
          type: JukeboxBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface

- type: entity
  name: blood-red music player
  description: A modern record player with a bright and sonorous sound. Supports most media formats. It's painted red, like blood paint.
  parent: ADTJukeBoxPlayer
  id: ADTJukeBoxPlayerSyndicate
  components:
  - type: Sprite
    sprite: ADT/Objects/Devices/music_player_syndicate.rsi
    layers:
    - state: icon
    - state: icon_inserted
      map: ["disk"]
      visible: false
    - state: volume_3
      map: ["volume"]
      visible: true
      shader: unshaded
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/smash.ogg
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1

- type: entity
  name: vintage music player
  description: Retro turntable with warm tube sound. Supports most media formats.
  parent: ADTJukeBoxPlayer
  id: ADTJukeBoxPlayerVintage
  components:
  - type: Sprite
    sprite: ADT/Objects/Devices/music_player_vintage.rsi
    layers:
    - state: icon
    - state: volume_3
      map: ["volume"]
      visible: true
  - type: GenericVisualizer
    visuals:
      enum.JukeboxVisuals.VolumeLevel:
        volume:
          Level0: { state: "volume_0" }
          Level1: { state: "volume_1" }
          Level2: { state: "volume_2" }
          Level3: { state: "volume_3" }
          Level4: { state: "volume_4" }
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
