- type: entity
  id: ADTBlueShieldMagazinePistolSubMachineGun
  name: SMG magazine (.35 auto)
  parent: MagazinePistolSubMachineGun
  description: 45-round double-stack magazine for submachine guns. Intended to hold general-purpose kinetic ammunition.
  components:
  - type: BallisticAmmoProvider
    capacity: 45
    proto: CartridgePistol
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/bullet_insert.ogg
  - type: Sprite
    sprite: ADT/Objects/Weapons/Guns/Ammunition/Magazine/Pistol/smg_mag_blueshield.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
