- type: entity
  name: Vector
  parent: [BaseWeaponSubMachineGun, ADTBaseMagneticGun] # ADT TWEAK
  id: WeaponSubMachineGunVector
  suffix: Deprecated use Drozd
  description: An excellent fully automatic Heavy SMG. Uses .45 magnum ammo.
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Guns/SMGs/vector.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: ADT/Objects/Weapons/Guns/SMGs/vector.rsi
  - type: Gun
    fireRate: 6
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
    availableModes:
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineMagnumSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineMagnumSubMachineGun
      gun_chamber:
        name: Chamber
        startingItem: CartridgeMagnum
        priority: 1
        whitelist:
          tags:
            - CartridgeMagnum
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  name: R-22 "Rodent"
  parent: [BaseWeaponPistol, ADTBaseAttachableHolder]
  id: ADTWeaponSubMachineGunR22Rodent
  description: R-22 "Rodent"
  components:
  - type: Sprite
    sprite: ADT/Objects/Weapons/Guns/SMGs/rodent-r22.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: ADT/Objects/Weapons/Guns/SMGs/rodent-r22.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 6
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolHighCapacity
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolHighCapacity
  - type: Gun
    selectedMode: Burst
    shotsPerBurst: 3
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/gun_sentry.ogg

- type: entity
  name: Drozd
  parent: WeaponSubMachineGunDrozd
  id: ADTWeaponSubMachineGunDrozdBlueshield
  description: A modern SMG manufactured by Nanotrasen’s Small Arms Division. It features an exceptional rate of fire in burst mode, useful for holding defensive angles or engaging hostiles at longer ranges. Feeds from .35 SMG magazines.
  components:
    - type: Sprite
      sprite: ADT/Objects/Weapons/Guns/SMGs/blueshield_drozd.rsi
      layers:
        - state: base
          map: ["enum.GunVisualLayers.Base"]
        - state: mag-0
          map: ["enum.GunVisualLayers.Mag"]
    - type: Clothing
      sprite: ADT/Objects/Weapons/Guns/SMGs/blueshield_drozd.rsi
    - type: AttachableHolder
      slots:
        rmc-aslot-underbarrel:
          startingAttachable: ADTAttachmentVerticalGrip
          whitelist:
            tags:
            - ADTAttachmentVerticalGrip
            - ADTAttachmentLaserSight
        rmc-aslot-rail:
          startingAttachable: ADTAttachmentMagneticHarness
          whitelist:
            tags:
            - ADTAttachmentMagneticHarness
            - ADTAttachmentReflexSight
            - ADTAttachmentT2Miniscope
        rmc-aslot-barrel:
          whitelist:
              tags:
              - ADTAttachmentSuppressor
              - ADTAttachmentAntiLyingWarrior
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: ADTBlueShieldMagazinePistolSubMachineGun
          insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
          priority: 2
          whitelist:
            tags:
              - MagazinePistolSubMachineGun
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: CartridgePistol
          priority: 1
          whitelist:
            tags:
              - CartridgePistol
