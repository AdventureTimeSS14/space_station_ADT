    damage:
      types:
        Blunt: 13
        Structural: 7.5
    soundHit: "/Audio/ADT/Weapons/Melee/bat.ogg"
  - type: Sprite
    sprite: ADT/Objects/Weapons/Melee/goldbat.rsi
    state: icon
