- type: entity
  id: ADTBaseBorgModuleSecurity
  parent: BaseBorgModule
  abstract: true
  components:
  - type: Tag
    tags:
    - ADTBorgModuleSecurity

- type: entity
  id: ADTBorgModuleDetention
  parent: [ ADTBaseBorgModuleSecurity, BaseProviderBorgModule ]
  name: detentions module
  components:
  - type: Sprite
    layers:
    - state: security
    - state: icons-detentions
  - type: ItemBorgModule
    hands:
    - item: ADTWeaponDisablerBorg
    - item: Handcuffs
      hand:
        emptyLabel: borg-slot-handcuff-empty
        emptyRepresentative: Handcuffs
        whitelist:
          components:
          - Handcuff
    - item: ADTtelescopicBaton
    - item: ADTBorgflash
  - type: BorgModuleIcon
    icon: { sprite: "/Textures/Objects/Misc/zipties.rsi", state: cuff }

- type: entity
  id: ADTBorgModuleHarm
  parent: [ ADTBaseBorgModuleSecurity, BaseProviderBorgModule ]
  name: harm module
  components:
  - type: Sprite
    layers:
    - state: security
    - state: icons-harm
  - type: ItemBorgModule
    hands:
    - item: Truncheon
    - item: ADTWeaponLaserCarbineBorg

- type: entity
  id: ADTBorgModuleRPD
  parent: [ BaseBorgModuleEngineering, BaseProviderBorgModule ]
  name: RPD cyborg module
  components:
  - type: Sprite
    sprite: ADT/Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: engineering
    - state: icon-rpd
  - type: ItemBorgModule
    hands:
    - item: ADTRPDRecharging
    - item: GasAnalyzer
    - item: HolofanProjectorBorg
    - item: PowerDrill
  - type: BorgModuleIcon
    icon: { sprite: ADT/Interface/Actions/actions_borg.rsi, state: rpd-module }

- type: entity
  id: ADTBorgModuleSalvage
  parent: [ BaseBorgModuleCargo, BaseProviderBorgModule ]
  name: salvage cyborg module
  components:
  - type: Sprite
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: cargo
    - state: icon-pka
  - type: ItemBorgModule
    hands:
    - item: WeaponProtoKineticAccelerator
      hand:
        emptyLabel: borg-slot-pka-empty
        emptyRepresentative: WeaponProtoKineticAccelerator
        whitelist:
          tags:
          - PKA
          - PKAUpgrade
    - item: WeaponGrapplingGun
    - item: BorgHandheldGPSBasic
    - item: HandHeldMassScannerBorg
    - item: BorgOreBagOfHolding
  - type: BorgModuleIcon
    icon: { sprite: ADT/Interface/Actions/actions_borg.rsi, state: salvage-module }

- type: entity
  id: ADTBorgModuleChemical
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: chemical cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-chem
  - type: ItemBorgModule
    hands:
    - item: HandheldHealthAnalyzer
    - item: Syringe
    - item: Syringe
    - item: ADTBorgDrinkGlass
    - item: ADTBorgDrinkGlass
    - item: ADTBorgDrinkGlass

- type: entity
  id: ADTBorgModuleAdvancedChemical
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: chemical cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-chemist
  - type: ItemBorgModule
    hands:
    - item: HandheldHealthAnalyzer
    - item: BorgHypo
    - item: BorgDropper
    - item: ChemistryEmptyVial
    - item: HandLabeler
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: adv-chem-module }

- type: entity
  id: ADTBorgModuleRescue
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: rescue cyborg module
  components:
