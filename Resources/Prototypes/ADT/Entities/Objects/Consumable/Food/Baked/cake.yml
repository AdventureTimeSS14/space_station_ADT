- type: entity
  name: waffle cake
  parent: FoodCakeBase
  id: ADTFoodCakeWaffle
  description: A cake consisting of thin wafer layers soaked in condensed milk and butter cream.
  components:
  - type: FlavorProfile
    flavors:
      - ADTCakeCakeWaffleFlavor
  - type: Sprite
    sprite: ADT/Objects/Consumable/Food/cake.rsi
    state: waffle
  - type: SliceableFood
    slice: ADTFoodCakeWaffleSlice
      
- type: entity
  name: slice of waffle cake
  parent: FoodCakeSliceBase
  id: ADTFoodCakeWaffleSlice
  description: A cake consisting of thin wafer layers soaked in condensed milk and butter cream.
  components:
  - type: FlavorProfile
    flavors:
      - ADTCakeCakeWaffleFlavor
  - type: Sprite
    sprite: ADT/Objects/Consumable/Food/cake.rsi
    state: waffle-slice
