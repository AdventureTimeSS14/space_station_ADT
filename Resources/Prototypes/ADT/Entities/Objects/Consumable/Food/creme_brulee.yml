- type: entity
  name: creme brulee
  parent: FoodInjectableBase
  id: ADTBrouletTorched
  description: A creme brulee with a crispy and toasty caramel-like crust.
  components:
  - type: Food
    trash:
    - FoodPlateTin
    utensil: Fork
  - type: FlavorProfile
    flavors:
      - sweet
  - type: Sprite
    sprite: ADT/Objects/Consumable/Food/creme_brulee.rsi
    state: broulet_torched
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 26
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Theobromine
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 5
          
- type: entity
