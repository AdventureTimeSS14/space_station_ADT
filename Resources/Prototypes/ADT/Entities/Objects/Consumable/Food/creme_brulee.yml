  components:
  - type: Sprite
    state: creme_broulet
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 35
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Theobromine
          Quantity: 5
        - ReagentId: Vitamin
