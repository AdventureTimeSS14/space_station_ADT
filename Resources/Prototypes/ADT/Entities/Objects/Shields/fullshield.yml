- type: entity
  name: Full Riot Shield
  parent: BaseShield
  id: ADTFullRiotShield
  suffix: Full Shield
  description: A big big shield. yeah.  very creative.
  components:
    - type: MeleeWeapon
      wideAnimationRotation: -10
      angle: 0
      damage:
        types:
          Blunt: 10
      soundHit:
        collection: MetalThud
    - type: Reflect
      reflectProb: 0.05
      spread: 90
    - type: Sprite
      sprite: ADT/Objects/Weapons/Melee/fullshield.rsi
      state: icon
    - type: Item
      sprite: ADT/Objects/Weapons/Melee/fullshield.rsi
      inhandVisuals:
        left:
          - state: metal-inhand
        right:
          - state: metal-inhand
      size: Ginormous
    - type: MultiHandedItem
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.4
          Slash: 0.4
          Piercing: 0.4
          Heat: 1.5
      activeBlockModifier:
        coefficients:
          Blunt: 0.50
          Slash: 0.40
          Piercing: 1
          Heat: 3
        flatReductions:
          Blunt: 1
          Slash: 1
          Piercing: 1
    - type: ClothingSpeedModifier
      walkModifier: 1
      sprintModifier: 0.4
    - type: HeldSpeedModifier
    - type: Construction
      graph: ADTShield
      node: ADTCompShield
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 600
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 500 #Weaker shield
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: WoodDestroy
    - type: Tag
      tags:
      - ADTFullRiotShitmadeShield

- type: entity
  name: blueshield officer's energy shield
  parent: BaseItem
  id: ADTBlueShieldEnergyShield
  description: An energy shield designed specifically for the BlueShield corps. It has a portable renewable battery with self-healing capability. This shield is the face of your corps, don't lose it!
  components:
    - type: ItemToggle
      predictable: false
      soundActivate:
        path: /Audio/Weapons/ebladeon.ogg
      soundDeactivate:
        path: /Audio/Weapons/ebladeoff.ogg
      soundFailToActivate:
        path: /Audio/Machines/button.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Weapons/ebladehum.ogg
    - type: ItemToggleSize
      activatedSize: Huge
    - type: ComponentToggler
      components:
      - type: DisarmMalus
        malus: 0.6
    - type: Sprite
      sprite: ADT/Objects/Weapons/Melee/blueshield_shield.rsi
      layers:
        - state: eshield-icon
        - state: eshield_on
          color: "#FFFFFF"
          visible: false
          shader: unshaded
          map: [ "shield" ]
    - type: Item
      size: Small
      sprite: ADT/Objects/Weapons/Melee/blueshield_shield.rsi
      heldPrefix: eshield
    - type: UseDelay
      delay: 0.5
    - type: ToggleableVisuals
      spriteLayer: shield
      inhandVisuals:
        left:
          - state: inhand-left-shield
            shader: unshaded
        right:
          - state: inhand-right-shield
            shader: unshaded
    - type: PointLight
      netsync: false
      enabled: false
      radius: 1.5
      energy: 2
      color: blue
    - type: Blocking
      isHasBlockingToggle: false
      isCharging: true
      isToggle: true
      passiveBlockModifier:
        coefficients:
          Blunt: 1
          Slash: 1
          Piercing: 1
          Heat: 1
      activeBlockModifier:
        coefficients:
          Blunt: 1
          Slash: 1
          Piercing: 1
          Heat: 1
    - type: ItemTogglePointLight
    - type: Appearance
    - type: Damageable
      damageContainer: Shield
    - type: Battery
      maxCharge: 1200
      startingCharge: 1200
    - type: PowerCell
    - type: BatterySelfRecharger
      autoRechargeRate: 10
      autoRechargePauseTime: 5
    - type: StaticPrice
      price: 500
    - type: Tag
      tags:
      - ADTEnergyShield
