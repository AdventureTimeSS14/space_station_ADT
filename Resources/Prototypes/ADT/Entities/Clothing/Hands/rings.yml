- type: entity
  parent: ClothingHandsBase
  id: ADTClothingHandsRingBlood
  name: blood ring
  description: Good ring.
  components:
  - type: Sprite
    sprite: ADT/Clothing/Hands/Rings/Rings.rsi
    state: icon-blood
  - type: Clothing
    slots: [finger]
    sprite: ADT/Clothing/Hands/Rings/Rings.rsi
    state: equipped-FINGER-blood
  - type: Item
    sprite: ADT/Clothing/Hands/Rings/Rings.rsi
    inhandVisuals:
      left:
      - state: inhand-left-blood
      right:
      - state: inhand-right-blood
    size: Tiny
  - type: StaticPrice
    price: 1000

