- type: entity
  id: ADTPitPoisoned
  parent: ADTPit
  name: poisoned well
  description: A source of poisoned water. Drinking from this is not recommended.
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
        reagents:
        - ReagentId: Toxin
          Quantity: 10000
  - type: SolutionRegeneration
    solution: tank
    duration: 0.1
    generated:
      reagents:
      - ReagentId: Toxin
        Quantity: 100

- type: entity
  id: ADTPitDried
  parent: ADTPit
  name: dried well
  description: A dried up well. No water left.
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
  - type: DrainableSolution
    solution: tank
  - type: Drink
    solution: tank
    transferAmount: 5
    delay: 1
    ignoreEmpty: true

- type: entity
  id: ADTCableReel
  parent: ADTTableBase
  name: cable reel
  description: A large reel for storing and organizing cables.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Icon
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: IconSmooth
    enabled: false
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Construction
    graph: ADTTable
    node: adtcablereel
  - type: Tag
    tags:
    - Table
    - ForceFixRotations

# Меловая доска
- type: entity
  parent: BaseStructure
  id: ADTChalkboard
  name: chalkboard
  description: A blackboard for writing messages with chalk.
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    sprite: ADT/Structures/Furniture/chalkboard.rsi
    state: chalkboard
    noRot: true
    layers:
    - state: chalkboard-text
      map: ["enum.PaperVisualLayers.Writing"]
      color: "#000000"
      visible: false
  - type: Icon
    sprite: ADT/Structures/Furniture/chalkboard.rsi
    state: chalkboard
  - type: Paper
    contentSize: 10000
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PaperVisuals
    backgroundModulate: "#000000"
    contentImageModulate: "#000000"
    fontAccentColor: "#ffffff"
  - type: Chalkboard
  - type: Appearance
  - type: InteractionOutline
  - type: Anchorable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 3
            max: 5
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTChalkboard
    node: adtchalkboard
