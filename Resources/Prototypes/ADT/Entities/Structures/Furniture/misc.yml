# Праздничный Диско-шар

- type: entity
  id: ADTDiscoBall
  parent: BaseStructureDynamic
  name: disco ball
  description: disco ball
  #abstract: true
  components:
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 190
        mask:
        - Impassable
  - type: Sprite
    drawdepth: Overdoors
    #offset: "0.0,0.3"
    sprite: ADT/Structures/Decoration/discoball.rsi
    state: discoball
    noRot: true
  - type: Anchorable
  - type: PointLight
    radius: 8
    energy: 4
  - type: RgbLightController
    layers: [ 0 ]
  - type: Pullable
  - type: Damageable
    damageContainer: Inorganic # The pot. Not the plant. Or is it plastic?
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTDiscoBallGraph
    node: adtdiscoball

- type: entity
  id: ADTPit
  parent: BaseStructure
  name: well
  description: A source of drinking water.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: Icon
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
        reagents:
        - ReagentId: Water
          Quantity: 10000
  - type: DrainableSolution
    solution: tank
  - type: Drink
    solution: tank
    transferAmount: 5
    delay: 1
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: ADTStandKatana
  parent: BaseStructure
  name: katana stand
  description: A stand for displaying a katana.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/stand_katana.rsi
    state: stand-katana
  - type: Icon
    sprite: ADT/Structures/Furniture/stand_katana.rsi
    state: stand-katana
  - type: Storage
    grid:
    - 0,0,2,2
    maxItemSize: Normal
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: ADTStandKatanaFwo
  parent: ADTStandKatana
  name: katana stand
  suffix: Fwo
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/stand_katana_fwo.rsi
    state: stand-katana-fwo
  - type: Icon
    sprite: ADT/Structures/Furniture/stand_katana_fwo.rsi
    state: stand-katana-fwo

