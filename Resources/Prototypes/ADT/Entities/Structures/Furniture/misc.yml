# Праздничный Диско-шар

- type: entity
  id: ADTDiscoBall
  parent: BaseStructureDynamic
  name: disco ball
  description: disco ball
  #abstract: true
  components:
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 190
        mask:
        - Impassable
  - type: Sprite
    drawdepth: Overdoors
    #offset: "0.0,0.3"
    sprite: ADT/Structures/Decoration/discoball.rsi
    state: discoball
    noRot: true
  - type: Anchorable
  - type: PointLight
    radius: 8
    energy: 4
  - type: RgbLightController
    layers: [ 0 ]
  - type: Pullable
  - type: Damageable
    damageContainer: Inorganic # The pot. Not the plant. Or is it plastic?
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTDiscoBallGraph
    node: adtdiscoball

- type: entity
  id: ADTDresserMusic
  parent: BaseStructure
  name: music dresser
  description: A wooden dresser with built-in music player. Store your things and enjoy music at the same time!
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/dresser_music.rsi
    state: dresser-music
  - type: Icon
    sprite: ADT/Structures/Furniture/dresser_music.rsi
    state: dresser-music
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,6,3
    maxItemSize: Normal
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.JukeboxUiKey.Key:
        type: JukeboxBoundUserInterface
  - type: Jukebox
    onState: dresser-music
    offState: dresser-music
    selectState: dresser-music
  - type: ApcPowerReceiver
    powerLoad: 100
    priority: Low
  - type: ExtensionCableReceiver
  - type: ActivatableUI
    key: enum.JukeboxUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true

- type: entity
  id: ADTCableReel
  parent: ADTTableBase
  name: cable reel
  description: A large reel for storing and organizing cables.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Icon
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Construction
    graph: ADTTable
    node: adtcablereel
  - type: Tag
    tags:
    - Table
    - ForceFixRotations