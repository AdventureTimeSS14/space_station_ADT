- type: entity
  id: ADTCableReel
  parent: BaseStructure
  name: cable reel
  description: A large reel for storing and organizing cables.
  components:
  - type: Animateable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.5
        density: 55
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: SpriteFade
  - type: Sprite
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Climbable
  - type: Bonkable
    bonkDamage:
      types:
        Blunt: 4
    bonkSound: !type:SoundCollectionSpecifier
      collection: TrayHit
  - type: Clickable
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Construction
    graph: ADTTable
    node: adtcablereel
  - type: Tag
    tags:
    - ForceFixRotations

- type: entity
  parent: BaseStructure
  id: ADTChalkboard
  name: chalkboard
  description: A blackboard for writing messages with chalk.
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    sprite: ADT/Structures/Furniture/chalkboard.rsi
    noRot: true
    layers:
    - state: chalkboard
    - state: chalkboard-text
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
  - type: Icon
    sprite: ADT/Structures/Furniture/chalkboard.rsi
    state: chalkboard
  - type: Paper
    contentSize: 10000
  - type: Chalkboard
    baseDescription: black chalk deck
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_default.svg.96dpi.png"
    backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
    contentMargin: 16.0, 16.0, 16.0, 16.0
    backgroundModulate: "#202421"
    fontAccentColor: "#ffffff"
    fontDefaultColor: "#ffffff"
  - type: Appearance
  - type: InteractionOutline
  - type: Anchorable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 3
            max: 5
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTChalkboard
    node: adtchalkboard
