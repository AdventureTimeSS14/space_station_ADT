- type: entity
  id: ADTPit
  parent: BaseStructure
  name: well
  description: A source of drinking water.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: Icon
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
        reagents:
        - ReagentId: Water
          Quantity: 10000
  - type: DrainableSolution
    solution: tank
  - type: Edible
    solution: tank
    transferAmount: 5
    delay: 1
    utensil: None
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

