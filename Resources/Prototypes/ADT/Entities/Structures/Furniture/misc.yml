# Праздничный Диско-шар

- type: entity
  id: ADTDiscoBall
  parent: BaseStructureDynamic
  name: disco ball
  description: disco ball
  #abstract: true
  components:
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 190
        mask:
        - Impassable
  - type: Sprite
    drawdepth: Overdoors
    #offset: "0.0,0.3"
    sprite: ADT/Structures/Decoration/discoball.rsi
    state: discoball
    noRot: true
  - type: Anchorable
  - type: PointLight
    radius: 8
    energy: 4
  - type: RgbLightController
    layers: [ 0 ]
  - type: Pullable
  - type: Damageable
    damageContainer: Inorganic # The pot. Not the plant. Or is it plastic?
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTDiscoBallGraph
    node: adtdiscoball

- type: entity
  id: ADTDresserMusic
  parent: BaseStructure
  name: music dresser
  description: A wooden dresser with built-in music player. Store your things and enjoy music at the same time!
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/dresser_music.rsi
    state: dresser-music
  - type: Icon
    sprite: ADT/Structures/Furniture/dresser_music.rsi
    state: dresser-music
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Storage
    grid:
    - 0,0,6,3
    maxItemSize: Normal
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.JukeboxUiKey.Key:
        type: JukeboxBoundUserInterface
  - type: Jukebox
    onState: dresser-music
    offState: dresser-music
    selectState: dresser-music
  - type: ApcPowerReceiver
    powerLoad: 100
    priority: Low
  - type: ExtensionCableReceiver
  - type: ActivatableUI
    key: enum.JukeboxUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: InteractionOutline
  - type: Clickable
  - type: Tag
    tags:
    - Wooden
  - type: Anchorable
  - type: Rotatable
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true

- type: entity
  id: ADTMetalPole
  parent: BaseStructure
  name: pole
  description: This could be either for a fire department or a brothel.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/metal_pole.rsi
    state: metal_pole
  - type: Icon
    sprite: ADT/Structures/Furniture/metal_pole.rsi
    state: metal_pole
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.45,0.2,0.45"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: ADTPit
  parent: BaseStructure
  name: well
  description: A source of drinking water.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: Icon
    sprite: ADT/Structures/Furniture/pit.rsi
    state: pit
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
        reagents:
        - ReagentId: Water
          Quantity: 10000
  - type: DrainableSolution
    solution: tank
  - type: Drink
    solution: tank
    transferAmount: 5
    delay: 1
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  id: ADTPitPoisoned
  parent: ADTPit
  name: poisoned well
  description: A source of poisoned water. Drinking from this is not recommended.
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
        reagents:
        - ReagentId: Toxin
          Quantity: 10000
  - type: SolutionRegeneration
    solution: tank
    duration: 0.1
    generated:
      reagents:
      - ReagentId: Toxin
        Quantity: 100

- type: entity
  id: ADTPitDried
  parent: ADTPit
  name: dried well
  description: A dried up well. No water left.
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 10000
  - type: DrainableSolution
    solution: tank
  - type: Drink
    solution: tank
    transferAmount: 5
    delay: 1
    ignoreEmpty: true

- type: entity
  id: ADTCableReel
  parent: ADTTableBase
  name: cable reel
  description: A large reel for storing and organizing cables.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Icon
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Construction
    graph: ADTTable
    node: adtcablereel
  - type: Tag
    tags:
    - Table
    - ForceFixRotations
