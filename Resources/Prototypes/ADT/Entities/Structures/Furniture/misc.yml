# Праздничный Диско-шар

- type: entity
  id: ADTDiscoBall
  parent: BaseStructureDynamic
  name: disco ball
  description: disco ball
  #abstract: true
  components:
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 190
        mask:
        - Impassable
  - type: Sprite
    drawdepth: Overdoors
    #offset: "0.0,0.3"
    sprite: ADT/Structures/Decoration/discoball.rsi
    state: discoball
    noRot: true
  - type: Anchorable
  - type: PointLight
    radius: 8
    energy: 4
  - type: RgbLightController
    layers: [ 0 ]
  - type: Pullable
  - type: Damageable
    damageContainer: Inorganic # The pot. Not the plant. Or is it plastic?
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: ADTDiscoBallGraph
    node: adtdiscoball

- type: entity
  id: ADTCableReel
  parent: BaseStructure
  name: cable reel
  description: A large reel for storing and organizing cables.
  components:
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Icon
    sprite: ADT/Structures/Furniture/cable_reel.rsi
    state: cable_reel
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - MidImpassable
  - type: Transform
    anchored: true
  - type: Placement
    mode: SnapgridCenter