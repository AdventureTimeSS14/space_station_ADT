- type: entity
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  id: ADTElectricGrillBBQ
  name: electric grill
  description: Good thing for barbecue in the yard!
  components:
  - type: Sprite
    sprite: ADT/Structures/Machines/electric_grill_bbq.rsi
    drawdepth: SmallObjects
    snapCardinals: true
    layers:
    - state: icon
    - map: ["enum.EntityHeaterVisuals.Setting"]
      shader: unshaded
      visible: false
  - type: ApcPowerReceiver
    powerLoad: 0 # off by default
  - type: EntityHeater
    settingSound:
      path: /Audio/Weapons/click.ogg
      params:
        volume: -6
  - type: ItemPlacer
    maxEntities: 4 # big grill, many steaks
    whitelist:
      components:
      - Temperature
  - type: PlaceableSurface
  - type: Machine
    board: ElectricGrillMachineCircuitboard
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.EntityHeaterVisuals.Setting:
        enum.EntityHeaterVisuals.Setting:
          Off: { visible: true, state: close }
          Low: { visible: true, state: low }
          Medium: { visible: true, state: medium }
          High: { visible: true, state: high }
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      itemcollide:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.14,-0.05,0.15,0.25"
        layer:
        - HighImpassable
        hard: false
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.14,-0.05,0.15,0.25"
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Pullable
  - type: Anchorable
    delay: 2
