- type: entity
  parent: [ Bed, BaseMachinePowered, ConstructibleMachine ]
  id: ADTAdvancedMedBed
  name: advanced hospital bed
  description: Top-of-the-shelf hospital bed, made in a special way to get patients up faster.
  components:
  - type: Sprite
    sprite: ADT/Structures/Furniture/adv_bed.rsi
    state: adv_bed
  - type: HealOnBuckle
    damage:
      types:
        Poison: -0.1
        Cold: -0.4
        Blunt: -0.2
        Slash: -0.4
        Piercing: -0.2
  - type: Construction
    graph: bed
  - type: ApcPowerReceiver
    powerLoad: 1000
  - type: ExtensionCableReceiver
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: Inorganic
  - type: Machine
    board: ADTAdvancedMedicalBedCircuitboard
  - type: InjectorBoost
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.05"
        density: 190
        mask:
        - LowImpassable
  - type: GuideHelp
    guides:
    - MedicalDoctor
