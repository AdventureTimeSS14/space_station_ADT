- type: entity
  parent: BaseItem
  id: ADTBloodPackTransfusion
  name: blood pack
  description: An empty blood pack ready to be filled.
  suffix: Empty
  components:
  - type: BloodPack
  - type: Sprite
    sprite: ADT/Objects/Medical/blood_pack.rsi
    layers:
    - state: bloodpack1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: bloodpack
  - type: Item
    sprite: ADT/Objects/Medical/blood_pack.rsi
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 100
        canMix: false
  - type: FitsInDispenser
    solution: pack
  - type: RefillableSolution
    solution: pack
  - type: DrainableSolution
    solution: pack
  - type: ExaminableSolution
    solution: pack
  - type: DrawableSolution
    solution: pack
  - type: InjectableSolution
    solution: pack
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 7
    fillBaseName: bloodpack
  - type: StaticPrice
    price: 30

- type: entity
  parent: ADTBloodPackTransfusion
  id: ADTBloodPackTransfusionFull
  suffix: Full
  components:
  - type: SolutionContainerManager
    solutions:
      pack:
        maxVol: 100
        canMix: false
        reagents:
        - ReagentId: Blood
          Quantity: 100

