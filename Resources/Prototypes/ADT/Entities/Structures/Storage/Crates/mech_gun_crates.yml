- type: entity
  parent: CrateBaseSecure
  id: ADTCrateMechWeaponSecure
  name: secure mech weapon crate
  components:
  - type: Icon
    sprite: Structures/Storage/Crates/weapon.rsi
  - type: Sprite
    sprite: Structures/Storage/Crates/weapon.rsi
  - type: AccessReader
    access: [["Armory"]]
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 240
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

- type: entity
  id: ADTMechGunImmolatorLaserCrate
  parent: ADTCrateMechWeaponSecure
  name: Immolator Crate
  description: Immolator Crate
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ADTMechGunImmolatorLaser
          amount: 1
