- type: entity
  parent: BaseStructure
  id: ADTWoodenTradeRack
  name: wooden trade rack
  description: A rack for storing things on.
  suffix: Oktoberfest
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/dodgeball.ogg"
  - type: Anchorable
  - type: InteractionOutline
  - type: PlaceableSurface
  - type: SpriteFade
  - type: Sprite
    sprite: ADT/Structures/Furniture/woodenshowcase.rsi
    state: wood_rack
    snapCardinals: true
    offset: "0.0,0.5"
    drawdepth: Overdoors
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.1"
        density: 140
        mask:
        - TableMask
        layer:
        - TableMask
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Climbable
  - type: StaticPrice
    price: 30

# Деревянные ящики
- type: entity
  parent: BaseStructureDynamic
  id: ADTWoodenBoxBase
  abstract: true
  name: wooden box
  description: wooden box.
  components:
  - type: Transform
    noRot: true
  - type: Icon
    sprite: ADT/Structures/Storage/wooden_box.rsi
    state: box-1
  - type: Sprite
    noRot: true
    sprite: ADT/Structures/Storage/wooden_box.rsi
    state: box-1
  - type: RandomSprite
    available:
      - "0":
          "box-1": null
          "box-2": null
          "box-3": null
          "box-4": null
          "box-5": null
          "box-6": null
  - type: InteractionOutline
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 50
        mask:
        - CrateMask
        layer:
        - MachineLayer
  - type: EntityStorage
  - type: PlaceableSurface
    isPlaceable: false
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: Construction
    graph: ADTWoodenBox
    node: adtwoodenbox
    containers:
      - entity_storage

- type: entity
  parent: ADTWoodenBoxBase
  id: ADTWoodenBox1

# Вариант для спавна с лутом (как коробки из тех-тоннелей)
- type: entity
  parent: ADTWoodenBoxBase
  id: ADTWoodenBoxRandom
  suffix: Random
  components:
  - type: StorageFill
    contents:
      - id: MaintenanceToolSpawner
        prob: 0.5
      - id: MaintenanceFluffSpawner
        prob: 0.5
