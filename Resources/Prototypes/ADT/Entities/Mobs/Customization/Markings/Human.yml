# Лисий хвост
- type: marking
  id: ADTFoxTail
  bodyPart: Tail
  groupWhitelist: [Human, Felinid]
  #sponsorOnly: false # AdventureTime-Sponsors
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
        - !type:CategoryColoring
          category: FacialHair
        - !type:SkinColoring
  sprites:
  - sprite: ADT/Mobs/Customization/Human/fox_parts.rsi
    state: tail_fox_wag_stripes_prime # AdventureTime-Sponsors
  - sprite: ADT/Mobs/Customization/Human/fox_parts.rsi
    state: tail_fox_wag_stripes_second # AdventureTime-Sponsors
  - sprite: ADT/Mobs/Customization/Human/fox_parts.rsi
    state: tail_fox_wag_stripes_third # AdventureTime-Sponsors

