- type: entity
  id: ActionADTBubblegumTripleCharge
  name: Triple Charge
  description: Совершить три быстрых рывка подряд.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    raiseOnUser: true
    icon:
      sprite: ADT/Effects/bubblegum_action_triple_charge.rsi
      state: icon
    useDelay: 6
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:BubblegumTripleChargeActionEvent

