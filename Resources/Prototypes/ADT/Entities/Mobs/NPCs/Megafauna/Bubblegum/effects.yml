  suffix: Bubblegum thick
  components:
  - type: SolutionContainerManager
    solutions:
      puddle:
        maxVol: 1000
        reagents:
        - ReagentId: Blood
          Quantity: 60

- type: entity
  id: ADTBubblegumChargeTelegraph
  name: target
  parent: BaseEffectGoliathTentacleSpawn
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Overdoors
    sprite: ADT/Effects/bubblegum_target_circle.rsi
    color: "#FF000099"
    layers:
    - state: icon
  - type: PointLight
    energy: 1.5
    radius: 3
    color: "#ff0000"
  - type: TimedDespawn
    lifetime: 1.5

