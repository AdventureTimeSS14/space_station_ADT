- type: entity
  parent: Puddle
  id: ADTPuddleBloodBubblegum
  name: blood
  suffix: Bubblegum
  components:
  - type: SolutionContainerManager
    solutions:
      puddle:
        maxVol: 1000
        reagents:
        - ReagentId: Blood
          Quantity: 30

- type: entity
  parent: ADTPuddleBloodBubblegum
