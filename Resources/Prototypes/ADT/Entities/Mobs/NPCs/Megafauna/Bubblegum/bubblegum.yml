- type: entity
  id: BaseMobBubblegum
  parent: BaseMobAsteroid
  abstract: true
  components:
  - type: Sprite
    sprite: ADT/Mobs/Aliens/Lavaland/bubblegum.rsi
    layers:
    - map:
      - enum.DamageStateVisualLayers.Base
      state: bubblegum
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bubblegum
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 1
        density: 80
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - StunImmune
  - type: NoSlip
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Fauna
  - type: Appearance
  - type: AshStormImmune
  - type: StatusEffects
    allowed: []
  - type: StaminaResistance
    damageCoefficient: 0
    worn: false

- type: entity
  id: ADTMegaFaunaBubblegum
  name: bubblegum
  description: bublbegum desc
  parent: BaseMobBubblegum
  components:
  - type: Destructible
    thresholds: []
  - type: GenericVisualizer
    visuals:
      enum.BubblegumVisuals.Enraged:
        enum.DamageStateVisualLayers.Base:
          True:
            color: "#950A0A"
          False:
            color: "#FFFFFF"
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: Damageable
    damageContainer: Bubblegum
    damageModifierSet: Bubblegum
  - type: MeleeWeapon
    attackRate: 0.5
    damage:
      types:
        Blunt: 40
        Structural: 150
    range: 2
    angle: 0
    animation: WeaponArcPunch
    soundHit:
      path: /Audio/ADT/Bubblegum/demon_attack1.ogg
  - type: HTN
    blackboard:
      VisionRadius: !type:Single "20"
      AggroVisionRadius: !type:Single "20"
      NavSmash: !type:Bool "true"
      NavInteract: !type:Bool "true"
      ADTBubblegumKeepDistance: !type:Single "5"
      ADTBubblegumRetreatTrigger: !type:Single "4"
    rootTask:
      task: ADTBubblegumCompound
  - type: Megafauna
  - type: ArmorPenetration
    penetration: 0.5
  - type: Bubblegum
  - type: BubblegumTripleCharge
  - type: BubblegumHallucinationCharge
  - type: BubblegumSurround
  - type: BubblegumBloodWarp
  - type: BubblegumSummonNarsi
  - type: BubblegumBloodAttack
  - type: BubblegumLoot
    randomAmountLoot:
      GoldOre: 10
      SilverOre: 10
      DiamondOre: 5
      PlasmaOre: 15
      UraniumOre: 10
      SpaceQuartz: 15
    randomLoot:
    - ADTMayhemBottle
    - ADTBloodContract
    # todo make 3 
    guaranteedLoot:
    - ADTClothingOuterHardsuitHECK
    - ADTKineticTrophyDemonClaws
    deathThemeSound:
      path: /Audio/ADT/Phantom/Sounds/psycho.ogg

- type: entity
  id: ADTMegaFaunaBubblegumHallucination
  name: bubblegum
  suffix: Hallucination
  categories:
  - HideSpawnMenu
  parent: BaseMobBubblegum
  components:
  - type: Sprite
    color: "#FFFFFF80"
    sprite: ADT/Mobs/Aliens/Lavaland/bubblegum.rsi
    layers:
    - map:
      - enum.DamageStateVisualLayers.Base
      state: bubblegum
  - type: MobThresholds
    thresholds:
      0: Alive
      1: Dead
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          ADTPuddleBloodBubblegum:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts:
        - Destruction
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: MeleeWeapon
    attackRate: 0.01
    damage:
      types:
        Blunt: 0
  - type: BubblegumHallucination
  - type: TimedDespawn
    lifetime: 4
  - type: HTN
    netsync: true
    rootTask:
      task: DoAbsolutelyNothingCompound

- type: htnCompound
  id: DoAbsolutelyNothingCompound
  branches:
    - tasks: []