- type: entity
  id: ADTMegaFaunaBubblegum
  parent: BaseMobAsteroid
  name: bubblegum
  description: bublbegum desc
  components:
  - type: Destructible
  - type: Sprite
    sprite: ADT/Mobs/Aliens/Lavaland/bubblegum.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: bubblegum
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bubblegum
  - type: GenericVisualizer
    visuals:
      enum.BubblegumVisuals.Enraged:
        enum.DamageStateVisualLayers.Base:
          True: { color: "#950A0A" }
          False: { color: "#FFFFFF" }
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 1
        density: 80
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 2
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: Damageable
    damageContainer: Drake # todo make bubblegum damage container
  - type: MeleeWeapon
    attackRate: 4
    angle: 0
    animation: WeaponArcPunch
    soundHit:
      path: /Audio/Weapons/smash.ogg
    damage:
      types:
        Blunt: 40
        Structural: 150
    range: 2
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
  - type: NoSlip
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: HTN
    rootTask:
      task: ADTBubblegumCompound
    blackboard:
      VisionRadius: !type:Single
        20
      AggroVisionRadius: !type:Single
        20
  - type: NPCUseActionOnTarget
    actions: ADTBubblegumActions
    delay: 5
  - type: Fauna
  - type: Megafauna
  - type: Bubblegum
  - type: BubblegumTripleCharge
  - type: BubblegumHallucinationCharge
  - type: BubblegumSurround
  - type: BubblegumBloodWarp
  - type: BubblegumSummonNarsi
  - type: BubblegumBloodAttack
  - type: Appearance
  - type: StatusEffects
    allowed:
    - Stutter
    - Weakness
    - RadiationProtection
    # todo make loot spawn
# ═══════════════════════════════════════════════════════════════════════════════
#  6) ГАЛЛЮЦИНАЦИЯ-КЛОН
# ═══════════════════════════════════════════════════════════════════════════════
- type: entity
  id: ADTMegaFaunaBubblegumHallucination
  parent: ADTMegaFaunaBubblegum
  name: bubblegum
  suffix: Hallucination
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: ADT/Mobs/Aliens/Lavaland/bubblegum.rsi
    color: "#FFFFFF80"
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: bubblegum
  - type: MobThresholds
    thresholds:
      0: Alive
      1: Dead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          ADTPuddleBloodBubblegum:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: MeleeWeapon
    attackRate: 0.01
    damage:
      types:
        Blunt: 0
  - type: BubblegumHallucination
  # Клон не должен сам выбирать действия и не должен преследовать цель —
  # его двигает ThrowingSystem через BubblegumChargeSystem.
  - type: HTN
    rootTask:
      task: IdleCompound
    blackboard:
      VisionRadius: !type:Single
        0
      AggroVisionRadius: !type:Single
        0
  - type: NPCUseActionOnTarget
    actions: ADTBubblegumActions
    delay: 99999
  - type: BubblegumTripleCharge
    delays: [ ]
  - type: BubblegumHallucinationCharge
    hallucinationsNormal: 0
    hallucinationsSmash: 0
    smashWaveDelays: [ ]
  - type: BubblegumSurround
    waves: 0
  - type: BubblegumBloodWarp
    outerRange: 0
    innerRange: 0
  - type: BubblegumSummonNarsi
    count: 0
  - type: BubblegumBloodAttack
    attemptInterval: 999999
  # Самоудаление через 8 секунд, если так и не врезался ни в кого.
  - type: TimedDespawn
    lifetime: 8

# ═══════════════════════════════════════════════════════════════════════════════
#  7) СПАВНЕР
# ═══════════════════════════════════════════════════════════════════════════════
- type: entity
  name: bubblegum spawner
  id: ADTSpawnMobBubblegum
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - state: ai
  - type: RandomSpawner
    prototypes:
    - ADTMegaFaunaBubblegum
  - type: TimedDespawn
    lifetime: 1
