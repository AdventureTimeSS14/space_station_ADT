# Tajaran mob (upstream PR#42476). Appearance/body/sprite come from AppearanceTajaran.
- type: entity
  save: false
  name: Tajaran McHands
  parent:
  - AppearanceTajaran
  - BaseSpeciesMobOrganic
  id: BaseMobTajaran
  abstract: true
  components:
    - type: MobThresholds
      thresholds:
        0: Alive
        90: Critical
        200: Dead
    - type: RoarAccent
    - type: Damageable
      damageModifierSet: Tajaran
    - type: Injurable
      damageContainer: Biological
    - type: MeleeWeapon
      soundHit:
        path: /Audio/Weapons/slash.ogg
      animation: WeaponArcClaw
      damage:
        types:
          Slash: 5
    - type: Temperature
      currentTemperature: 310.15
      specificHeat: 46
    - type: TemperatureDamage
      heatDamageThreshold: 325
      coldDamageThreshold: 240
      coldDamage:
        types:
          Cold : 0.2 #per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat : 0.1 #per second, scales with temperature & other constants
    - type: MovementSpeedModifier
      baseWalkSpeed : 2.7
      baseSprintSpeed : 4.6
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.35
          density: 145 #lower density
          restitution: 0.0
          mask:
            - MobMask
          layer:
            - MobLayer
    - type: SlowOnDamage
      speedModifierThresholds:
        42: 0.7
        60: 0.5
    - type: TemperatureSpeed
      thresholds:
        273: 0.8
        240: 0.6
        210: 0.4
    - type: Wagging
    - type: InteractionPopup
      successChance: 1
      interactSuccessString: petting-success-generic
      interactSuccessSound: /Audio/ADT/Felinid/cat_purr1.ogg
      messagePerceivedByOthers: petting-success-soft-floofy-others
      interactSuccessSpawn: EffectHearts
      interactDelay: 4
    - type: Vocal
      wilhelm: "/Audio/ADT/Felinid/cat_wilhelm.ogg"
      sounds:
        Male: MaleFelinid
        Female: FemaleFelinid
        Unsexed: MaleFelinid
    - type: LanguageSpeaker
      languages:
        GalacticCommon: Speak
        SikTaj: Speak
        CintaTaj: Speak
    - type: SizeAttributeWhitelist # Frontier
      tall: true
      tallscale: 0.95
      short: true
      shortscale: 0.85
    - type: Tag
      tags:
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
      - AnomalyHost
      - ADTCatEmotes