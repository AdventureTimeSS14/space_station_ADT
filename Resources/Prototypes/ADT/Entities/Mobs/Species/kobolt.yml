# Kobolt mob (upstream PR#42476). Reuses Reptilian flavor (MobReptilian) + AppearanceKobolt body.
# AppearanceKobolt is listed last so KoboltSpecies overrides Reptilian on HumanoidProfile.
- type: entity
  save: false
  name: Urisst' Mzhand
  parent:
  - MobReptilian
  - AppearanceKobolt
  id: BaseMobKobolt
  abstract: true
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      180: Dead
  - type: PassiveDamage # Slight passive regen. Assuming one damage type, comes out to about 4 damage a minute.
    allowedStates:
    - Alive
    damage:
      types:
        Heat: -0.06
        Cold: -0.04
        Blunt: -0.08
        Slash: -0.08
        Piercing: -0.08
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ADTCorelanderBlood
        Quantity: 175
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Piercing: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 380
    coldDamageThreshold: 260  #starting temperature damage treshold
    coldDamage:
      types:
        Cold : 0.2 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 0.1 #per second, scales with temperature & other constants
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 140 #lower density
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#801900"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: TemperatureSpeed
    thresholds:
      283: 0.8
      240: 0.6
      200: 0.4
  - type: SlowOnDamage
    speedModifierThresholds:
      46: 0.75
      58: 0.55
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.7
    baseSprintSpeed : 4.5
  - type: LanguageSpeaker
    languages:
      GalacticCommon: Speak
      Draconic: Speak
      CintaTaj: Speak
  - type: SizeAttributeWhitelist # Frontier
    tall: true
    tallscale: 0.9
    short: true
    shortscale: 0.8
  - type: Thieving
    stealthy: false
    hideStealthyAlert: true
