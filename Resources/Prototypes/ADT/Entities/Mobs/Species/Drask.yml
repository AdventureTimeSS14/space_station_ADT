# Drask mob (upstream PR#42476). Appearance/body/sprite come from AppearanceDrask.
- type: entity
  parent:
  - AppearanceDrask
  - BaseSpeciesMobOrganic
  id: BaseMobDrask
  name: Urist McDrask
  abstract: true
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      110: Critical
      220: Dead
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.8
  - type: PointLight
    color: "#10207b"
    energy: 1
    radius: 1.2
  - type: Prying
    speedModifier: 1
  - type: PassiveDamage # Slight passive regen. Assuming one damage type, comes out to about 4 damage a minute.
    allowedStates:
    - Alive
    damage:
      types:
        Heat: -0.04
        Blunt: -0.06
        Slash: -0.06
        Piercing: -0.06
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 10
  - type: StaminaDamageOnHit
    damage: 5
  - type: Bloodstream
    bloodRefreshAmount: 2
    bloodReferenceSolution:
      reagents:
      - ReagentId: Cryoxadone
        Quantity: 375
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.3
    baseSprintSpeed : 4.3
  - type: Temperature
    showColdAlert: false
    currentTemperature: 293.15 # 20C - нормальная температура тела
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 313.15 # 40C
    coldDamageThreshold: 243.15 # -30C - порог когда активируется coldDamage с лечением.
    coldDamage: #per second, scales with temperature & other constants
      types:
        Blunt: -0.25
        Heat: -0.25
        Poison: -0.1
        Cellular: -0.05
    heatDamage: #per second, scales with temperature & other constants
      types:
        Heat : 4.0
  - type: TemperatureSpeed
    thresholds:
      -33: 1
      -103: 1
      -173: 1
  - type: SlowOnDamage
    speedModifierThresholds:
      62: 0.8
      86: 0.6
  - type: ThermalRegulator
    sweatHeatRegulation: 1500
    shiveringHeatRegulation: 500
    normalBodyTemperature: 273.15
    thermalRegulationTemperatureThreshold: 25
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 275 # bigger density
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#0091ff"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Speech
    speechSounds: Drask
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: Vocal
    sounds:
      Male: MaleDrask
      Female: FemaleDrask
      Unsexed: MaleDrask
  - type: Damageable
    damageModifierSet: Drask
  - type: Injurable
    damageContainer: Biological
  - type: LanguageSpeaker
    languages:
      GalacticCommon: Speak
      Drask: Speak
  - type: SizeAttributeWhitelist # Frontier
    tall: true
    tallscale: 1.15
    short: true
    shortscale: 1