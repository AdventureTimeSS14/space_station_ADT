# Shadekin mob (upstream PR#42476). Appearance/body/sprite/inventory come from AppearanceShadekin.
- type: entity
  save: false
  parent:
  - AppearanceShadekin
  - ADTBaseSpeciesMobNonBreathing
  id: BaseMobShadekin
  abstract: true
  name: Урист МакСумеречник
  components:
  - type: OnGhostAttemtpDamage # При суициде будет нормально наносится урон не удушением а кровотечением.
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: ADTFoodMeatShadekin
      amount: 4
  - type: Speech
    allowedEmotes: ['Thump']
  - type: BodyEmotes
    soundsId: ShadekinBodyEmotes
  - type: Puller
    needsHands: false
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Critical
      160: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      42: 0.7
      58: 0.5
  - type: Damageable
    damageModifierSet: Shadekin
  - type: Injurable
    damageContainer: Biological # Shadekin
  - type: Barotrauma
    damage:
      types:
        Blunt: 1 # В секунду.
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ShadekinBlood
        Quantity: 180
    bloodlossDamage:
      types:
        Bloodloss:
          1
    bloodlossHealDamage:
      types:
        Bloodloss:
          -0.25
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 330
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 0.25 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      273: 0.8
      240: 0.6
      200: 0.4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130 #lower density
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 2
        Slash: 3
        Piercing: 1
  - type: FlashModifier
    modifier: 2
  - type: Shadekin
  - type: Vocal
    sounds:
      Male: MaleShadekin
      Female: FemaleShadekin
      Unsexed: MaleShadekin
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: petting-success-soft-floofy
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: petting-success-soft-floofy-others
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.5
    baseSprintSpeed : 4.5
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#3C0F24"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: LanguageSpeaker
    languages:
      GalacticCommon: Speak
      Mar: Speak
  - type: SizeAttributeWhitelist # Frontier
    tall: true
    tallscale: 1
    short: true
    shortscale: 0.85
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - ADTIgnoreChokeSpeechBlocking
    - ADTShadekinEmotes