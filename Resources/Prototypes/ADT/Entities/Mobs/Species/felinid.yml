# Felinid mob (upstream PR#42476). Human-based — body/sprite/inventory come from AppearanceFelinid.
- type: entity
  save: false
  name: Base felinid
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: BaseMobFelinid
  abstract: true
  components:
  - type: Hunger
    baseDecayRate: 0.024
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.9
    damageRecovery:
      types:
        Asphyxiation: -1.9
  - type: Vocal
    wilhelm: "/Audio/ADT/Felinid/cat_wilhelm.ogg"
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      185: Dead
  - type: SizeAttributeWhitelist
    tall: true
    tallscale: 1.1
    short: true
    shortscale: 0.9
  - type: WoundLicking
  - type: Destructible #процесс разрушения на органы
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt #при каком дамаге это происходит
        damage: 350
      behaviors:
      - !type:GibBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 1500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.30
        density: 160
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.6
    baseSprintSpeed : 4.6
  - type: SlowOnDamage
    speedModifierThresholds:
      48: 0.85
      64: 0.65
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 170
  - type: Damageable
    damageModifierSet: Felinid
  - type: Injurable
    damageContainer: Biological
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 0.9
        Slash: 4
  - type: Speech
    speechSounds: Alto
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Butcherable
    butcheringType: Spike # TODO human.
    spawned:
      - id: FoodMeat
      - id: ClothingHeadHatCatEars
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: petting-success-generic
    interactSuccessSound: /Audio/ADT/Felinid/cat_purr1.ogg
    messagePerceivedByOthers: petting-success-soft-floofy-others
    interactSuccessSpawn: EffectHearts
    interactDelay: 4
  - type: NyaAccent
  - type: LanguageSpeaker
    languages:
      GalacticCommon: Speak
      Nekomimetic: Speak
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - ADTCatEmotes