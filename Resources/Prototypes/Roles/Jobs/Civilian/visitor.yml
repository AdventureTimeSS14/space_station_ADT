  canBeAntag: false
  icon: JobIconVisitor
  setPreference: false
  overrideConsoleVisibility: true
  # Corvax-MRP-Start
  # access:
  # - Maintenance
  # Corvax-MRP-End
  extendedAccess:
  - External
  - Maintenance # Corvax-MRP
