- type: job
  id: Janitor
  name: job-name-janitor
  description: job-description-janitor
  playTimeTracker: JobJanitor
  startingGear: JanitorGear
  icon: "JobIconJanitor"
  supervisors: job-supervisors-hop
  access:
  - Service
  - Janitor
  - Maintenance
  special:
  - !type:GiveItemOnHolidaySpecial
    holiday: GarbageDay
    prototype: WeaponRevolverInspector
  #ADT-Tweak-Start
  - !type:AddSpeciesComponentSpecial
    species: IPC
    components:
      - type: BorgChassis
        maxModules: 1
        moduleWhitelist:
          tags:
          - BorgModuleGeneric
          - BorgModuleJanitor
        ipc: true
  #ADT-Tweak-Start

- type: startingGear
  id: JanitorGear
  equipment:
    shoes: ClothingShoesGaloshes
    # id: JanitorPDA ADT: different PDAs in loadouts
    ears: ClothingHeadsetService
    belt: ClothingBeltJanitorFilled
  #storage:
    #back:
    #- Stuff

- type: startingGear
  id: JanitorMaidGear
  equipment:
    jumpsuit: ClothingUniformJumpskirtJanimaid
    # id: JanitorPDA ADT: different PDAs in loadouts
    gloves: ClothingHandsGlovesJanitor
    head: ClothingHeadHatCatEars
    ears: ClothingHeadsetService
    belt: ClothingBeltJanitorFilled

- type: chameleonOutfit
  id: JanitorChameleonOutfit
  job: Janitor
  equipment:
    head: ClothingHeadHatPurplesoft
    eyes: ClothingEyesGlassesCheapSunglasses
    mask: ClothingMaskGas
    neck: ClothingNeckScarfStripedPurple
    outerClothing: ClothingOuterWinterJani
    gloves: ClothingHandsGlovesJanitor
