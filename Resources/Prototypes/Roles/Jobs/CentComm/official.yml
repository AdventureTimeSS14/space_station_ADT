- type: job
  id: CentralCommandOfficial
  name: job-name-centcomoff
  description: job-description-centcomoff
  playTimeTracker: JobCentralCommandOfficial
  setPreference: false
  startingGear: CentcomGear
  icon: "JobIconNanotrasen"
  supervisors: job-supervisors-centcom # Corvax-JobSupervisors
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  #ADT-Tweak-Start
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddSpeciesComponentSpecial
    species: IPC
    components:
      - type: BorgChassis
        maxModules: 1
        moduleWhitelist:
          tags:
          - BorgModuleGeneric
          - BorgModuleService
          - BorgModuleJanitor
          - BorgModuleMedical
          - BorgModuleScience
          - BorgModuleEngineering
          - BorgModuleCargo
          - ADTBorgModuleSecurity
        ipc: true
  #ADT-Tweak-End

- type: startingGear
  id: CentcomGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCentcomOfficial
    shoes: ClothingShoesBootsCombatFilled
    head: ClothingHeadHatCentcom
    eyes: ClothingEyesGlassesCommand
    gloves: ClothingHandsGlovesColorBlack
    outerClothing: ClothingOuterArmorCentcommCarapace
    id: CentcomPDA
    ears: ClothingHeadsetAltCentCom
    belt: WeaponPistolN1984
    pocket1: BoxFolderCentComClipboardThreePapers
    pocket2: PenCentcom
  storage:
    back:
    - Flash #ADT-CustomADTLoadout
    - ADTtelescopicBaton #ADT-CustomADTLoadout


- type: chameleonOutfit
  id: CentralCommandOfficialOutfit
  job: CentralCommandOfficial
  hasMindShield: true
  equipment:
    neck: ClothingNeckScarfStripedCentcom
    mask: ClothingMaskGasCentcom
