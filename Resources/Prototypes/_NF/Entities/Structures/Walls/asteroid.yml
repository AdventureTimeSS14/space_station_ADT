# Frontier - scrap pile with ore

- type: entity
  id: WallRockScrapPile
  parent: WallRockAndesite
  name: scrap pile
  description: A pile of scrap.
  suffix: Scrap
  components:
  - type: OreVein
    oreChance: 1.0
    currentOre: NFOreScrap
  - type: Icon
    sprite: _NF/Structures/Walls/rock.rsi
    state: scraprock01
  - type: Sprite
    sprite: _NF/Structures/Walls/rock.rsi
    layers:
    - state: scraprock01
      map: [ "scraprock_variant" ]
    - map: [ "enum.EdgeLayer.South" ]
      state: scraprock_south
    - map: [ "enum.EdgeLayer.East" ]
      state: scraprock_east
    - map: [ "enum.EdgeLayer.North" ]
      state: scraprock_north
    - map: [ "enum.EdgeLayer.West" ]
      state: scraprock_west
    - state: rock_scrap
      map: [ "enum.MiningScannerVisualLayers.Overlay" ]
  - type: RandomSprite
    available:
      - scraprock_variant:
          scraprock01: ""
          scraprock02: ""
          scraprock03: ""
          scraprock04: ""
          scraprock05: ""
          scraprock06: ""
          scraprock07: ""

