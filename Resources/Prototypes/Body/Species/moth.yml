        back:
          sizeMaps:
            32:
              sprite: Mobs/Species/Moth/displacement.rsi
              state: back
        outerClothing:
          sizeMaps:
            32:
              sprite: Mobs/Species/Moth/displacement.rsi
              state: outerclothing
        gloves:
          sizeMaps:
            32:
              sprite: Mobs/Species/Moth/displacement.rsi
              state: hand
