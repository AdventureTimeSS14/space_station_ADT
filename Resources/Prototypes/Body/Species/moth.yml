        HandRight: OrganMothHandRight
        HandLeft: OrganMothHandLeft
        LegLeft: OrganMothLegLeft
        LegRight: OrganMothLegRight
        FootLeft: OrganMothFootLeft
        FootRight: OrganMothFootRight
        Brain: OrganMothBrain
        Eyes: OrganMothEyes
        Tongue: OrganMothTongue
        Appendix: OrganMothAppendix
        Ears: OrganMothEars
        Lungs: OrganMothLungs
        Heart: OrganMothHeart
        Stomach: OrganMothStomach
        Liver: OrganMothLiver
        Kidneys: OrganMothKidneys
    - type: HumanoidProfile
      species: Moth

- type: entity
  parent:
    - AppearanceMoth
    - BaseSpeciesMobOrganic
  id: MobMoth
  name: Urist McFluff
  components:
    - type: Damageable
      damageModifierSet: Moth
    - type: Injurable
    - type: ZombieAccentOverride
      accent: zombieMoth
    - type: Speech
      speechVerb: Moth
      allowedEmotes: ["Chitter", "Squeak", "FlapWings", "Buzz"] # ADT-tweak: restored FlapWings and Buzz. Deleted "Flap"
    - type: TypingIndicator
      proto: moth
    - type: CreamPied
      sprite:
        sprite: Effects/creampie.rsi
        state: creampie_moth
    - type: Bloodstream
      bloodReferenceSolution:
        reagents:
          - ReagentId: InsectBlood
            Quantity: 300
    - type: DamageVisuals
      damageOverlayGroups:
        Brute:
          sprite: Mobs/Effects/brute_damage.rsi
          color: "#808A51"
        Burn:
          sprite: Mobs/Effects/burn_damage.rsi
    - type: MothAccent
    - type: Vocal
      sounds:
        Male: UnisexMoth
        Female: UnisexMoth
        Unsexed: UnisexMoth
    - type: BodyEmotes
      soundsId: MothBodyEmotes
    - type: MovementSpeedModifier
      baseWeightlessAcceleration: 1.5 # Move around more easily in space.
      baseWeightlessFriction: 1
      baseWeightlessModifier: 1
    - type: Flammable
      damage:
        types:
          Heat: 2.5 # moths burn more easily
    - type: Temperature
      currentTemperature: 310.15
      specificHeat: 46
    - type: TemperatureDamage # Moths hate the heat and thrive in the cold.
      heatDamageThreshold: 320
      coldDamageThreshold: 230
      coldDamage:
        types:
          Cold: 0.05 # per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat: 3 # per second, scales with temperature & other constants
    - type: TemperatureSpeed
      thresholds:
        289: 0.9
        275: 0.8
        250: 0.7
    # ADT-tweak-start: restored moth-specific features
    - type: DashAction
      actionProto: ADTActionDashMoth
    - type: SizeAttributeWhitelist # Frontier
      tall: true
      tallscale: 1
      short: true
      shortscale: 0.85
  # ADT-tweak-end

