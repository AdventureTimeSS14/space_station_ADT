              state: hand
        shoes:
          sizeMaps:
            32:
              sprite: Mobs/Species/Moth/displacement.rsi
              state: shoes
      displacements:
        jumpsuit:
          sizeMaps:
            32:
              sprite: Mobs/Species/Moth/displacement.rsi
