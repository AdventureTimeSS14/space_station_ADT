- type: gameMap
  id: EventHub
  mapName: 'EventHub'
  mapPath: /Maps/SDMaps/SDEvents/EventHub.yml
  minPlayers: 5
  maxPlayers: 80
  stations:
    EventHub:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0}EventHub {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '-'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_lox.yml
        - type: StationJobs
          availableJobs:
            Passenger: [ -1, -1 ]