  id: goldwatch
  name: Золотые часы с гравировкой
  suffix: "freealeq"
  description: Эти золотые механические часы блестят настолько ярко, что могут кого-нибудь ослепить. Одно золотое звено этих часов стоит как среднестатистическое жалованье сотрудника корпорации, что ясно даёт понять о статусе носителя. Рядом с циферблатом виднеется чёрная гравировка "М.Э."
  components:
    - type: Sprite
      sprite: SD/Entities/Weapons/Warehouse/freealeq/watch.rsi
      state: icon
    - type: Item
      sprite: SD/Entities/Weapons/Warehouse/freealeq/watch.rsi
    - type: Clothing
      sprite: SD/Entities/Weapons/Warehouse/freealeq/watch.rsi

