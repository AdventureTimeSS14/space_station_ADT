#------=СКЛАД ДАРОВ МАППЕРОВ=------
- type: entity
  id: Tomahawk
  name: тактический томагавк
  description: Обычный томагавк, или же топорик, обмотанный для удобства использования красным кордом, излишком свисающим с края. Общий вид топорика поношенный, лезвие хорошо заточено.
  parent: CombatKnife
  components:
  - type: Tag
    tags:
    - Knife
  - type: Sprite
    sprite: SD/Entities/Weapons/Warehouse/topor-myasnika.rsi
    state: icon
  - type: Item
    sprite: SD/Entities/Weapons/Warehouse/topor-myasnika.rsi
    storedSprite:
      state: icon
      sprite: SD/Entities/Weapons/Warehouse/topor-myasnika.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    soundHit:
      path: /Audio/SD/Weapons/Melee/Warehouse/hit.ogg
    soundSwing:
      path: /Audio/SD/Weapons/Melee/Warehouse/miss.ogg
    damage:
      types:
        Slash: 12
  - type: ThrowingAngle
    angle: 90
    angularVelocity: true

