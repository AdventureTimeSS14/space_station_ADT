- type: entity
  id: honorandloyalty
  parent: ADTWeaponRevolverLesserUnica
  suffix: "freealeq"
  name: Честь и Верность
  description: Этот револьвер является полным описанием своего владельца. По виду револьвера можно понять, что он верно служит хозяину на протяжении многих лет. На стволе револьвера виднеется гравировка "М.Э.", которая, судя по всему, была выцарапана.
  components:
    - type: Sprite
      sprite: SD/Entities/Weapons/Warehouse/freealeq/revgun.rsi
      state: icon
    - type: Item
      sprite: SD/Entities/Weapons/Warehouse/freealeq/revgun.rsi
      storedSprite:
        state: icon
        sprite: SD/Entities/Weapons/Warehouse/freealeq/revgun.rsi

- type: entity
