  - ADTCMOPDA # ADT tweak
  # ADT underwear tweak start
  - ADTTopCMO
  - ADTBottomCMO
  - ADTSocks
  # ADT underwear tweak end
  - SurvivalMedical
  - Trinkets
 # - ChiefMedicalOfficerJobTrinkets
