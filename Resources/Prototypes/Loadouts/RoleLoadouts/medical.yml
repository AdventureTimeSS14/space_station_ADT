## Role Loadouts

- type: roleLoadout
  id: JobChiefMedicalOfficer
  groups:
  - Inventory # Corvax-Loadouts
  - GroupTankHarness
  - ChiefMedicalOfficerHead
  - MedicalMask
  - ChiefMedicalOfficerJumpsuit
  - MedicalGloves
  - MedicalBackpack
